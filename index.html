<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>sUAS database</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #1e1e1e;
      color: #f0f0f0;
      font-family: Courier, serif;
    }

    body { padding: 2rem; }

    /* ── Refined Header Style ── */
    .header-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.5rem;
      border-bottom: 2px solid #333;
      padding-bottom: 12px;
    }
    .header-container h1 { 
      margin: 0; 
      font-size: 1.6rem; 
      letter-spacing: 2px; 
      font-weight: bold; 
      color: #fff; 
      text-transform: uppercase;
      text-shadow: 0 0 8px rgba(77, 163, 255, 0.2);
    }
    .header-info { text-align: right; font-size: 0.72rem; color: #888; display: flex; flex-direction: column; gap: 4px; }
    .status-indicator { color: #44ff44; font-weight: bold; }

    h2 {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid #444;
      padding-bottom: 0.5rem;
      text-transform: lowercase;
    }

    /* ── Column Header for Refresh Button ── */
    .col-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1px solid #444;
      margin-bottom: 1rem;
    }
    .col-header h2 { border: none; margin: 0; padding: 0; }
    .refresh-btn {
      background: none;
      border: none;
      color: #4da3ff;
      cursor: pointer;
      font-family: Courier;
      font-size: 0.75rem;
      padding: 0;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .refresh-btn:hover { opacity: 1; text-decoration: underline; }

    .columns { display: flex; justify-content: space-between; gap: 2rem; align-items: flex-start; }
    .column { flex: 1; min-width: 0; }

    ul { list-style: none; padding: 0; }
    li { margin-bottom: 1rem; }

    a { text-decoration: none; color: #4da3ff; }
    a:hover { text-decoration: underline; }

    .scroll-wrap {
      max-height: 520px;
      overflow-y: auto;
      padding-right: 6px;
      -webkit-mask-image: linear-gradient(to bottom, black 99%, transparent 100%);
      mask-image: linear-gradient(to bottom, black 99%, transparent 100%);
    }

    .scroll-wrap::-webkit-scrollbar { width: 5px; }
    .scroll-wrap::-webkit-scrollbar-track { background: transparent; }
    .scroll-wrap::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 4px; }
    .scroll-wrap::-webkit-scrollbar-thumb:hover { background: #5a4370; }

    /* ── X column ── */
    #x-embed-container {
      display: none;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #333;
    }

    #x-embed-container iframe {
      display: block;
      width: 100% !important;
      border: none !important;
    }

    .x-fallback-header {
      font-size: 0.82rem;
      color: #888;
      margin-bottom: 0.75rem;
    }

    .x-fallback-header a { color: #4da3ff; }

    .account-card {
      display: flex;
      flex-direction: column;
      background: #252525;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 0.75rem 0.9rem;
      margin-bottom: 0.6rem;
      transition: border-color 0.15s ease, transform 0.12s ease;
      box-shadow: 0 0 10px rgba(77, 163, 255, 0.06);
    }

    .account-card:hover {
      border-color: #4da3ff;
      transform: translateY(-1px);
      box-shadow: 0 0 14px rgba(77, 163, 255, 0.13);
    }

    .account-card .handle { font-weight: 700; color: #4da3ff; font-size: 0.9rem; margin-bottom: 0.2rem; }
    .account-card .handle:hover { text-decoration: underline; }
    .account-card .desc { font-size: 0.82rem; color: #aaa; line-height: 1.4; }
    .account-card .tag { font-size: 0.72rem; color: #7a5a96; margin-top: 0.25rem; }

    /* ── News & academia cards ── */
    .news-list, .academia-list { display: grid; grid-template-columns: 1fr; gap: 0.8rem; }

    .card {
      background: #4B365F;
      border: 1px solid #3d2c4e;
      border-radius: 10px;
      padding: 0.9rem 1rem;
      transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.2s ease;
      text-align: center;
      box-shadow: 0 0 12px rgba(100, 65, 120, 0.35);
    }

    .card:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 20px rgba(120, 80, 150, 0.55);
      border-color: #5a4370;
    }

    .card a.title {
      display: inline-block;
      color: #fff;
      font-weight: 700;
      text-decoration: none;
      line-height: 1.35;
    }

    .card a.title:hover { text-decoration: underline; }

    .academia-card {
      background: #2e3d52;
      border: 1px solid #263547;
      box-shadow: 0 0 12px rgba(50, 90, 130, 0.35);
    }

    .academia-card:hover {
      box-shadow: 0 0 20px rgba(60, 110, 160, 0.55);
      border-color: #3a5472;
    }

    .meta {
      margin-top: 0.55rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
    }

    .meta .source { color: #f1e9fa; font-size: 0.9rem; font-weight: 600; }
    .meta .author { color: #e9dbf6; font-size: 0.88rem; }
    .meta .date   { color: #d9c8ee; font-size: 0.86rem; }

    .academia-card .meta .source { color: #c8dff5; }
    .academia-card .meta .author { color: #b0cce8; font-size: 0.82rem; }
    .academia-card .meta .date   { color: #96b8d8; font-size: 0.82rem; }

    .status {
      color: #cfcfcf;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin: 0.25rem 0 1rem 0;
      font-size: 0.95rem;
    }
    .status.error { border-color: #513333; background: #2a1e1e; color: #ffbcbc; }

    @media (max-width: 900px) { .columns { flex-direction: column; } }
  </style>
</head>
<body>

  <noscript style="color:#ffbcbc;">This page requires JavaScript to load feeds.</noscript>

  <div class="header-container">
    <h1>sUAS Database</h1>
    <div class="header-info">
      <span class="status-indicator">● SYSTEM_ONLINE</span>
      <span id="sync-time">SYNC: --:--</span>
    </div>
  </div>

  <div class="columns">

    <div class="column">
      <div class="col-header">
        <h2>X</h2>
        <button onclick="location.reload()" class="refresh-btn">[refresh system]</button>
      </div>
      <div id="x-embed-container">
        <a class="twitter-timeline"
           href="https://twitter.com/OW7168414619053/lists/drones"
           data-theme="dark" data-height="520"
           data-chrome="noheader nofooter noborders transparent"></a>
      </div>
      <div id="x-fallback">
        <p class="x-fallback-header">
          curated accounts —
          <a href="https://x.com/OW7168414619053/lists/drones" target="_blank" rel="noopener noreferrer">open full list on X ↗</a>
        </p>
        <div class="scroll-wrap">
          <div id="account-cards"></div>
        </div>
      </div>
    </div>

    <div class="column">
      <h2>news</h2>
      <div id="news-status" class="status" style="display:none;"></div>
      <div class="scroll-wrap">
        <ul id="feed2" class="news-list"></ul>
      </div>
    </div>

    <div class="column">
      <h2>academia</h2>
      <div id="academia-status" class="status" style="display:none;"></div>
      <div class="scroll-wrap">
        <ul id="feed3" class="academia-list"></ul>
      </div>
    </div>

  </div>

  <script>
    /* ── Account cards (Dronefare & KyivIndependent Removed) ── */
    var ACCOUNTS = [
      { handle: 'UAWeapons',       desc: 'Ukrainian weapons & drone footage tracker',                                          tag: 'OSINT · battlefield' },
      { handle: 'DefMon3',         desc: 'Detailed OSINT, frequent FPV footage & analysis',                                    tag: 'OSINT · battlefield' },
      { handle: 'Rayan_Nat_UA',    desc: 'Ukrainian frontline drone footage',                                                  tag: 'OSINT · Ukraine' },
      { handle: 'naalsio26',       desc: 'FPV strike compilation & tactical analysis',                                         tag: 'OSINT · FPV' },
      { handle: 'OSINTtechnical',  desc: 'Broad OSINT with strong drone coverage',                                             tag: 'OSINT' },
      { handle: 'UAControlMap',    desc: 'Conflict mapping & drone incident tracking',                                         tag: 'OSINT · mapping' },
      { handle: 'FPVukraine',      desc: 'Dedicated Ukrainian FPV drone operations',                                           tag: 'FPV · Ukraine' },
      { handle: 'dronewarriors',   desc: 'FPV warfare coverage',                                                               tag: 'FPV · warfare' },
      { handle: 'UkrainianFPV',    desc: 'Frontline FPV operator content',                                                    tag: 'FPV · Ukraine' },
      { handle: 'sambennis',       desc: 'Drone warfare analyst',                                                              tag: 'analysis' },
      { handle: 'drones_watcher',  desc: 'Tracks drone use in conflict zones',                                                 tag: 'analysis' },
      { handle: 'JominiW',         desc: 'Military analyst, strong UAS focus',                                                 tag: 'analysis' },
      { handle: 'CalibreObscura',  desc: 'Weapons & equipment analyst, FPV coverage',                                         tag: 'analysis · FPV' },
      { handle: 'MENASTREAM',      desc: 'Premier Sahel OSINT — drone use by state & non-state actors in Mali/Niger/Burkina', tag: 'Sahel · OSINT' },
      { handle: 'TheWarZone',      desc: 'The War Zone — breaking defense & UAS news',                                        tag: 'publication' },
      { handle: 'sUASnews',        desc: 'sUAS News — dedicated small UAS industry coverage',                                 tag: 'publication' }
    ];

    (function buildAccountCards() {
      var container = document.getElementById('account-cards');
      if (!container) return;
      ACCOUNTS.forEach(function(acc) {
        var div = document.createElement('div');
        div.className = 'account-card';
        div.innerHTML =
          '<a class="handle" href="https://x.com/' + acc.handle + '" target="_blank" rel="noopener noreferrer">@' + acc.handle + '</a>' +
          '<span class="desc">' + acc.desc + '</span>' +
          '<span class="tag">' + acc.tag + '</span>';
        container.appendChild(div);
      });
    })();

    window.addEventListener('load', function() {
      var script = document.createElement('script');
      script.src = 'https://platform.twitter.com/widgets.js';
      script.async = true;
      script.onload = function() {
        if (!window.twttr || !window.twttr.ready) return;
        window.twttr.ready(function(twttr) {
          twttr.events.bind('rendered', function() {
            setTimeout(function() {
              var iframe = document.querySelector('#x-embed-container iframe');
              if (iframe && iframe.offsetHeight > 200) {
                document.getElementById('x-fallback').style.display = 'none';
                document.getElementById('x-embed-container').style.display = 'block';
              }
            }, 1000);
          });
        });
      };
      document.body.appendChild(script);
    });

    /* ── Shared helpers ── */
    function formatDate(dateStr) {
      try {
        var d = new Date(dateStr);
        if (isNaN(d.getTime())) return null;
        return d.toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' });
      } catch (e) { return null; }
    }

    function updateSyncTime() {
      var now = new Date();
      var time = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
      document.getElementById('sync-time').textContent = 'SYNC: ' + time;
    }

    function showStatus(msg, isError, elId) {
      var el = document.getElementById(elId);
      if (!el) return;
      el.textContent = msg || '';
      el.className = isError ? 'status error' : 'status';
      el.style.display = msg ? 'block' : 'none';
      updateSyncTime();
    }

    function splitTitle(title) {
      if (!title) return { headline: '', publication: '' };
      var h = title.indexOf(' - ');
      if (h !== -1) return { headline: title.slice(0, h).trim(), publication: title.slice(h + 3).trim() };
      var e = title.indexOf(' — ');
      if (e !== -1) return { headline: title.slice(0, e).trim(), publication: title.slice(e + 3).trim() };
      return { headline: title.trim(), publication: '' };
    }

    function textOf(node, tag) {
      var els = node.getElementsByTagName(tag);
      return (els && els.length) ? (els[0].textContent || '').trim() : '';
    }

    var STOPWORDS = { a:1,an:1,the:1,in:1,on:1,at:1,to:1,of:1,and:1,or:1,for:1,is:1,are:1,was:1,were:1,its:1,it:1,as:1,by:1,with:1,from:1,that:1,this:1,be:1,has:1,have:1,after:1,over:1,says:1,say:1,new:1,amid:1,into:1,how:1,why:1,what:1,when:1,who:1 };

    function fingerprint(title) {
      return (title || '').toLowerCase().replace(/[^a-z0-9\s]/g, '').split(/\s+/).filter(function(w) { return w.length > 2 && !STOPWORDS[w]; });
    }

    function jaccard(a, b) {
      var setA = {}, all = {}, inter = 0, union = 0;
      a.forEach(function(w) { setA[w] = 1; all[w] = 1; });
      b.forEach(function(w) { all[w] = 1; });
      Object.keys(all).forEach(function(w) { if (setA[w] && b.indexOf(w) !== -1) inter++; union++; });
      return union === 0 ? 0 : inter / union;
    }

    function dedupeItems(items) {
      var seenLinks = {}, seenFPs = [], out = [];
      (items || []).forEach(function(it) {
        var key = (it.link || '').split('?')[0];
        if (seenLinks[key]) return;
        seenLinks[key] = true;
        var fp = fingerprint(it.title);
        if (seenFPs.some(function(s) { return jaccard(fp, s) > 0.6; })) return;
        seenFPs.push(fp);
        out.push(it);
      });
      return out;
    }

    function sortDesc(items) {
      return (items || []).slice().sort(function(a, b) { return new Date(b.pubDateISO || 0) - new Date(a.pubDateISO || 0); });
    }

    /* ── Cache ── */
    var NEWS_CACHE_KEY = 'news_cache_v14';
    var ACAD_CACHE_KEY = 'acad_cache_v3';
    var CACHE_TTL_MS   = 2 * 60 * 60 * 1000;

    function saveCache(key, items) {
      try { localStorage.setItem(key, JSON.stringify(items || [])); localStorage.setItem(key + '_t', String(Date.now())); } catch(e) {}
    }

    function loadCache(key) {
      try {
        var raw = localStorage.getItem(key);
        var when = parseInt(localStorage.getItem(key + '_t') || '0', 10);
        return { items: raw ? JSON.parse(raw) : [], when: when, fresh: when && (Date.now() - when < CACHE_TTL_MS) };
      } catch(e) { return { items: [], when: 0, fresh: false }; }
    }

    /* ── News feed ── */
    var TITLE_REQUIRE_TERMS = [
      'fpv', 'small drone', 'small drones', 'quadcopter', 'commercial drone',
      'suas', 'micro drone', 'nano drone', 'drone swarm', 'first-person view',
      'hobby drone', 'modified drone', 'dji', 'fpv attack', 'fpv strike',
      'fpv drone', 'drone warfare', 'drone strike', 'counter-drone', 'anti-drone',
      'counter-uas', 'drone unit', 'drone crew', 'drone pilot', 'drone operator',
      'unmanned aerial', 'uncrewed', 'drone attack', 'drone kamikaze'
    ];

    var TITLE_BLOCKLIST = [
      'shahed','geran','tb2','tb-2','bayraktar','akinci','aksungur',
      'mq-9','mq9','reaper','predator drone','global hawk',
      'wing loong','ch-4','ch-5','heron','hermes','watchkeeper',
      'hale drone','male drone','hale uav','male uav',
      'long-range drone','strategic drone','cruise missile','ballistic missile','glide bomb',
      'drone light show','drone show','amazon drone','drone photography',
      'drone racing league','drone racing championship','best drone','consumer drone',
      'drone review','dji mini','dji air 3','dji mavic mini',
      'aerial photography','firefighting drone','agriculture drone','crop drone',
      'medical drone','package delivery','postal drone','delivery drone',
      'drone footage','cinematic drone'
    ];

    function isTitleBlocked(t) { var l=(t||'').toLowerCase(); return TITLE_BLOCKLIST.some(function(x){return l.indexOf(x)!==-1;}); }
    function titlePassesRequire(t) { var l=(t||'').toLowerCase(); return TITLE_REQUIRE_TERMS.some(function(x){return l.indexOf(x)!==-1;}); }

    var QUERY_A = '("FPV drone" OR "FPV attack" OR "FPV strike" OR "FPV drones" OR "small drone" OR "small drones" OR "quadcopter" OR "commercial drone" OR "modified drone" OR "off-the-shelf drone" OR "cheap drone") AND (military OR combat OR warfare OR Ukraine OR army OR battlefield OR weapon) when:7d';
    var QUERY_B = '("FPV" OR "small UAS" OR sUAS OR "micro drone" OR "nano drone" OR "commercial quadcopter" OR "DJI" OR "first-person view drone") AND (military OR defense OR army OR warfare OR weapon OR "counter-drone" OR "anti-drone") when:7d';

    var FEED_URL_A = 'https://news.google.com/rss/search?q=' + encodeURIComponent(QUERY_A);
    var FEED_URL_B = 'https://news.google.com/rss/search?q=' + encodeURIComponent(QUERY_B);

    var FEEDS_TIER1 = [
      { url: FEED_URL_A,                                                                              pub: '',                 requireFilter: false },
      { url: FEED_URL_B,                                                                              pub: '',                 requireFilter: false },
      { url: 'https://twz.com/feed',                                                                 pub: 'The War Zone',     requireFilter: true  },
      { url: 'https://www.suasnews.com/feed',                                                        pub: 'sUAS News',        requireFilter: false },
      { url: 'https://dronefare.substack.com/feed',                                                  pub: 'Dronefare',        requireFilter: false },
      { url: 'https://kyivindependent.com/feed/',                                                    pub: 'Kyiv Independent', requireFilter: true  }
    ];

    var FEEDS_TIER2 = [
      { url: 'https://www.ukrinform.net/rss/block-lastnews',                                         pub: 'Ukrinform',        requireFilter: true  },
      { url: 'https://united24media.com/feed',                                                       pub: 'United24 Media',   requireFilter: true  },
      { url: 'https://feeds.reuters.com/reuters/worldNews',                                          pub: 'Reuters',          requireFilter: true  },
      { url: 'https://www.defensenews.com/arc/outboundfeeds/rss/category/unmanned/?outputType=xml', pub: 'Defense News',     requireFilter: false },
      { url: 'https://dronexl.co/feed',                                                              pub: 'DroneXL',          requireFilter: true  },
      { url: 'https://www.covertshores.com/feeds/posts/default',                                     pub: 'Covert Shores',    requireFilter: true  }
    ];

    function buildProxyUrls(feedUrl) {
      var sep = feedUrl.indexOf('?') === -1 ? '?' : '&';
      var aug = feedUrl + sep + '_=' + Date.now();
      return [
        'https://cors.isomorphic-git.org/' + aug,
        'https://corsproxy.io/?' + aug,
        'https://api.allorigins.win/raw?url=' + encodeURIComponent(aug)
      ];
    }

    async function tryFetchXML(feedUrl) {
      var urls = buildProxyUrls(feedUrl);
      for (var i = 0; i < urls.length; i++) {
        try {
          var res = await fetch(urls[i]);
          if (!res.ok) continue;
          var xml = new DOMParser().parseFromString(await res.text(), 'text/xml');
          if (xml.getElementsByTagName('parsererror').length) continue;
          return xml;
        } catch(e) {}
      }
      throw new Error('proxies failed');
    }

    async function fetchRss2Json(feedUrl, count) {
      var sep = feedUrl.indexOf('?') === -1 ? '?' : '&';
      var url = 'https://api.rss2json.com/v1/api.json?count=' + (count||50) + '&rss_url=' + encodeURIComponent(feedUrl + sep + '_=' + Date.now());
      var res = await fetch(url);
      if (!res.ok) throw new Error('rss2json ' + res.status);
      return res.json();
    }

    function itemsFromXml(xmlDoc, limit, opts) {
      opts = opts || {};
      var out = [], items = xmlDoc.getElementsByTagName('item');
      var n = Math.min(items.length, limit || 50);
      for (var i = 0; i < n; i++) {
        var it = items[i];
        var rawTitle = textOf(it,'title') || 'Untitled';
        var sourceNodes = it.getElementsByTagName('source');
        var source = sourceNodes.length ? (sourceNodes[0].textContent||'').trim() : '';
        var split = splitTitle(rawTitle);
        var author = '';
        var creators = it.getElementsByTagName('dc:creator');
        if (creators.length) author = (creators[0].textContent||'').trim();
        if (!author) author = textOf(it,'author');
        var item = { title: split.headline||'Untitled', link: textOf(it,'link')||'#', publication: opts.pub||source||split.publication||'', author: author, pubDateISO: textOf(it,'pubDate')||'' };
        if (opts.requireFilter && !titlePassesRequire(item.title)) continue;
        out.push(item);
      }
      return out;
    }

    function itemsFromRss2Json(json, limit, opts) {
      opts = opts || {};
      var out = [], arr = (json && json.items) || [];
      var n = Math.min(arr.length, limit || 50);
      for (var i = 0; i < n; i++) {
        var it = arr[i] || {};
        var split = splitTitle(it.title||'');
        var item = { title: split.headline||'Untitled', link: it.link||'#', publication: opts.pub||it.author||split.publication||'', author: it.author||'', pubDateISO: it.pubDate||'' };
        if (opts.requireFilter && !titlePassesRequire(item.title)) continue;
        out.push(item);
      }
      return out;
    }

    async function fetchOneFeed(f) {
      var augUrl = f.url.indexOf('news.google.com') !== -1 ? f.url + '&hl=en&gl=US&ceid=US:en' : f.url;
      var opts = { pub: f.pub, requireFilter: f.requireFilter };
      try { return itemsFromXml(await tryFetchXML(augUrl), 50, opts); }
      catch(e) {
        try { return itemsFromRss2Json(await fetchRss2Json(augUrl, 50), 50, opts); }
        catch(e2) { return []; }
      }
    }

    function renderNews(items) {
      var list = document.getElementById('feed2');
      list.innerHTML = '';
      var filtered = (items||[]).filter(function(it){ return !isTitleBlocked(it.title); });
      var ordered = sortDesc(dedupeItems(filtered));
      var n = Math.min(ordered.length, 20);
      if (!n) { list.innerHTML = '<li class="card">No items available right now.</li>'; return; }
      for (var i = 0; i < n; i++) {
        var it = ordered[i];
        var li = document.createElement('li');
        li.className = 'card';
        var dt = it.pubDateISO ? formatDate(it.pubDateISO) : null;
        var html = '<a class="title" href="'+(it.link||'#')+'" target="_blank" rel="noopener noreferrer">'+(it.title||'Untitled')+'</a>';
        html += '<div class="meta">';
        if (it.publication) html += '<div class="source">'+it.publication+'</div>';
        if (it.author)      html += '<div class="author">'+it.author+'</div>';
        if (dt)             html += '<div class="date">'+dt+'</div>';
        html += '</div>';
        li.innerHTML = html;
        list.appendChild(li);
      }
    }

    var allNewsItems = [];

    async function loadNews() {
      var cache = loadCache(NEWS_CACHE_KEY);
      if (cache.items && cache.items.length) { allNewsItems = cache.items; renderNews(allNewsItems); }
      else { document.getElementById('feed2').innerHTML = '<li class="card" style="opacity:.6">Loading…</li>'; }

      var t1 = await Promise.allSettled(FEEDS_TIER1.map(fetchOneFeed));
      t1.forEach(function(r){ if (r.status==='fulfilled') allNewsItems = allNewsItems.concat(r.value); });
      saveCache(NEWS_CACHE_KEY, allNewsItems);
      renderNews(allNewsItems);
      showStatus('', false, 'news-status');

      setTimeout(async function() {
        var t2 = await Promise.allSettled(FEEDS_TIER2.map(fetchOneFeed));
        t2.forEach(function(r){ if (r.status==='fulfilled') allNewsItems = allNewsItems.concat(r.value); });
        saveCache(NEWS_CACHE_KEY, allNewsItems);
        renderNews(allNewsItems);
      }, 1500);
    }

    /* ── Refined Academia: arXiv API ────────────────────────────────────── */
    var ARXIV_QUERIES = [
      { q: 'all:"FPV drone" OR all:"FPV strike" OR all:"FPV attack" AND (all:military OR all:warfare)' },
      { q: 'all:"small drones" OR all:"quadcopter" AND (all:combat OR all:battlefield OR all:tactical)' },
      { q: 'all:"counter-UAS" OR all:"anti-drone" OR all:"C-UAS" AND (all:defense OR all:military)' }
    ];

    async function fetchArxiv(queryObj) {
      var baseUrl = 'https://export.arxiv.org/api/query?' +
        'search_query=' + encodeURIComponent(queryObj.q) +
        '&start=0&max_results=12&sortBy=submittedDate&sortOrder=descending';
      var urls = [
        baseUrl,
        'https://corsproxy.io/?' + baseUrl,
        'https://api.allorigins.win/raw?url=' + encodeURIComponent(baseUrl)
      ];
      for (var i = 0; i < urls.length; i++) {
        try {
          var res = await fetch(urls[i]);
          if (!res.ok) continue;
          var xml = new DOMParser().parseFromString(await res.text(), 'text/xml');
          if (xml.getElementsByTagName('parsererror').length) continue;
          var entries = xml.getElementsByTagName('entry');
          if (!entries.length) continue;
          var out = [];
          for (var j = 0; j < entries.length; j++) {
            var entry = entries[j];
            var title = (textOf(entry, 'title') || '').replace(/\s+/g, ' ').trim();
            if (!title || title.toLowerCase() === 'error') continue;
            var idEl = entry.getElementsByTagName('id')[0];
            var link = idEl ? (idEl.textContent || '').trim() : '#';
            var authorEls = entry.getElementsByTagName('author');
            var authorNames = [];
            for (var k = 0; k < Math.min(authorEls.length, 3); k++) {
              var nameEl = authorEls[k].getElementsByTagName('name')[0];
              if (nameEl) authorNames.push(nameEl.textContent.trim());
            }
            if (authorEls.length > 3) authorNames.push('et al.');
            var pubDate = textOf(entry, 'published') || textOf(entry, 'updated') || '';
            out.push({ title: title, link: link, publication: 'arXiv', author: authorNames.join(', '), pubDateISO: pubDate });
          }
          return out;
        } catch(e) {}
      }
      return [];
    }

    function renderAcademia(items) {
      var list = document.getElementById('feed3');
      list.innerHTML = '';
      var ordered = sortDesc(dedupeItems(items || []));
      var n = Math.min(ordered.length, 20);
      if (!n) {
        list.innerHTML = '<li class="card academia-card">No papers found. <a href="https://arxiv.org/search/?searchtype=all&query=drone+military+warfare" target="_blank" rel="noopener noreferrer">Search arXiv ↗</a></li>';
        return;
      }
      for (var i = 0; i < n; i++) {
        var it = ordered[i];
        var li = document.createElement('li');
        li.className = 'card academia-card';
        var dt = it.pubDateISO ? formatDate(it.pubDateISO) : null;
        var html = '<a class="title" href="'+(it.link||'#')+'" target="_blank" rel="noopener noreferrer">'+(it.title||'Untitled')+'</a>';
        html += '<div class="meta">';
        if (it.publication) html += '<div class="source">'+it.publication+'</div>';
        if (it.author)      html += '<div class="author">'+it.author+'</div>';
        if (dt)             html += '<div class="date">'+dt+'</div>';
        html += '</div>';
        li.innerHTML = html;
        list.appendChild(li);
      }
    }

    var allAcadItems = [];

    async function loadAcademia() {
      var cache = loadCache(ACAD_CACHE_KEY);
      if (cache.items && cache.items.length) { allAcadItems = cache.items; renderAcademia(allAcadItems); }
      else { document.getElementById('feed3').innerHTML = '<li class="card academia-card" style="opacity:.6">Loading…</li>'; }

      var results = await Promise.allSettled(ARXIV_QUERIES.map(fetchArxiv));
      var combined = [];
      results.forEach(function(r){ if (r.status==='fulfilled') combined = combined.concat(r.value); });

      if (combined.length) {
        allAcadItems = combined;
        saveCache(ACAD_CACHE_KEY, allAcadItems);
        renderAcademia(allAcadItems);
        showStatus('', false, 'academia-status');
      } else if (!allAcadItems.length) {
        document.getElementById('feed3').innerHTML =
          '<li class="card academia-card">Could not load papers. ' +
          '<a href="https://arxiv.org/search/?searchtype=all&query=drone+military+warfare" target="_blank" rel="noopener noreferrer">Search arXiv ↗</a></li>';
        showStatus('arXiv unavailable — try again shortly.', true, 'academia-status');
      }
    }

    /* ── Init ── */
    updateSyncTime();
    loadNews();
    loadAcademia();
    setInterval(function(){ allNewsItems=[]; loadNews(); }, 300000);
    setInterval(function(){ allAcadItems=[]; loadAcademia(); }, 600000);
  </script>

</body>
