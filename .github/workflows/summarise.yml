name: Daily News Summary

on:
  schedule:
    - cron: '0 23 * * *'
    - cron: '0 22 * * 1'
  workflow_dispatch:

jobs:
  summarise:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch RSS and summarise news
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python3 << 'EOF'
          import urllib.request, urllib.parse, urllib.error, xml.etree.ElementTree as ET, json, os, datetime

          api_key = os.environ.get("OPENROUTER_API_KEY", "")
          print(f"API key present: {bool(api_key)} (length {len(api_key)})")

          QUERY_A = '("FPV drone" OR "FPV attack" OR "FPV strike" OR "FPV drones" OR "small drone" OR "quadcopter") AND (military OR combat OR warfare OR Ukraine OR battlefield) after:2025-12-31 when:7d'
          QUERY_B = '("small UAS" OR sUAS OR "commercial quadcopter" OR "DJI") AND (military OR defense OR warfare OR "counter-drone" OR "anti-drone") after:2025-12-31 when:7d'

          FEEDS = [
            f"https://news.google.com/rss/search?q={urllib.parse.quote(QUERY_A)}&hl=en&gl=US&ceid=US:en",
            f"https://news.google.com/rss/search?q={urllib.parse.quote(QUERY_B)}&hl=en&gl=US&ceid=US:en",
          ]

          BLOCK = ['shahed','geran','tb2','bayraktar','akinci','mq-9','reaper','global hawk','long-range drone','strategic drone','drone light show','drone show','amazon drone','drone photography','best drone','drone review','firefighting drone','agriculture drone','medical drone','package delivery','delivery drone']

          headlines = []
          for url in FEEDS:
            try:
              print(f"Fetching: {url[:80]}...")
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              with urllib.request.urlopen(req, timeout=15) as r:
                raw = r.read()
              tree = ET.fromstring(raw)
              count = 0
              for item in tree.iter('item'):
                t = (item.findtext('title') or '').strip()
                tl = t.lower()
                if not t: continue
                if any(b in tl for b in BLOCK): continue
                if ' - ' in t:
                  t = t[:t.rfind(' - ')].strip()
                headlines.append(t)
                count += 1
              print(f"  -> {count} headlines from this feed")
            except Exception as e:
              print(f"  Feed error: {e}")

          headlines = list(dict.fromkeys(headlines))[:30]
          print(f"Total headlines after dedup: {len(headlines)}")

          updated = datetime.datetime.now(datetime.timezone.utc).strftime("%-d %b %Y, %H:%M UTC")

          if not headlines:
            with open("summary.json", "w") as f:
              json.dump({"summary": "No matching sUAS headlines found in today's feeds.", "updated": updated}, f)
            exit(0)

          headline_text = "\n".join(f"- {h}" for h in headlines)
          print("Headlines:\n" + headline_text)

          prompt = (
            "You are a defence analyst tracking small UAS (small commercial quadcopters and FPV drones only). "
            "Based strictly on the following recent news headlines, write a 3-5 sentence summary. "
            "Only include events and developments that occurred in 2026 — ignore anything referencing events from 2025 or earlier. "
            "Start with the phrase 'News articles published within the previous 24 hours have outlined'. "
            "Focus only on specific developments, fine details, and new information mentioned in these headlines — do not give broad overviews, do not summarise the wider conflict, do not draw sweeping conclusions. "
            "If a headline mentions a specific incident, weapon, tactic, or figure, include it. "
            "Be factual, specific, and concise.\n\n"
            "Headlines:\n" + headline_text
          )

          print("Calling OpenRouter API...")
          req = urllib.request.Request(
            "https://openrouter.ai/api/v1/chat/completions",
            data=json.dumps({
              "model": "arcee-ai/trinity-large-preview:free",
              "messages": [{"role": "user", "content": prompt}],
              "max_tokens": 300,
              "temperature": 0.4
            }).encode(),
            headers={
              "Content-Type": "application/json",
              "Authorization": f"Bearer {api_key}",
              "HTTP-Referer": "https://github.com",
              "X-Title": "sUAS News Summariser"
            }
          )
          try:
            with urllib.request.urlopen(req) as r:
              data = json.loads(r.read())
            summary = data["choices"][0]["message"]["content"].strip()
            print(f"Summary: {summary[:120]}...")
          except urllib.error.HTTPError as e:
            print(f"API error: HTTP {e.code}: {e.reason}")
            print("Body:", e.read().decode())
            with open("summary.json", "w") as f:
              json.dump({"summary": "Summary unavailable today — API error.", "updated": updated}, f)
            exit(0)
          except Exception as e:
            print(f"API error: {e}")
            with open("summary.json", "w") as f:
              json.dump({"summary": "Summary unavailable today — API error.", "updated": updated}, f)
            exit(0)

          with open("summary.json", "w") as f:
            json.dump({"summary": summary, "updated": updated}, f)
          print("summary.json written successfully.")
          EOF

      - name: Fetch arXiv and summarise academia (Mondays only)
        if: github.event.schedule == '0 22 * * 1' || github.event_name == 'workflow_dispatch'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python3 << 'EOF'
          import urllib.request, urllib.parse, urllib.error, xml.etree.ElementTree as ET, json, os, datetime

          api_key = os.environ.get("OPENROUTER_API_KEY", "")

          ARXIV_QUERIES = [
            'all:"FPV drone" OR all:"FPV strike" AND (all:military OR all:warfare)',
            'all:"small drones" OR all:"quadcopter" AND (all:combat OR all:battlefield)',
            'all:"counter-UAS" OR all:"anti-drone" AND (all:defense OR all:military)',
          ]

          papers_raw = []
          for q in ARXIV_QUERIES:
            try:
              url = f"https://export.arxiv.org/api/query?search_query={urllib.parse.quote(q)}&max_results=10&sortBy=submittedDate&sortOrder=descending"
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              with urllib.request.urlopen(req, timeout=15) as r:
                raw = r.read()
              tree = ET.fromstring(raw)
              for entry in tree.iter('{http://www.w3.org/2005/Atom}entry'):
                title = (entry.findtext('{http://www.w3.org/2005/Atom}title') or '').strip().replace('\n', ' ')
                abstract = (entry.findtext('{http://www.w3.org/2005/Atom}summary') or '').strip().replace('\n', ' ')[:300]
                published = (entry.findtext('{http://www.w3.org/2005/Atom}published') or '').strip()
                if title:
                  papers_raw.append({"title": title, "abstract": abstract, "published": published})
              print(f"  -> {len(papers_raw)} papers so far")
            except Exception as e:
              print(f"  arXiv error: {e}")

          seen_titles = set()
          papers_deduped = []
          for p in papers_raw:
            if p["title"] not in seen_titles:
              seen_titles.add(p["title"])
              papers_deduped.append(p)

          papers_deduped.sort(key=lambda x: x["published"], reverse=True)
          top5 = papers_deduped[:5]
          papers = [f"Title: {p['title']}\nAbstract: {p['abstract']}" for p in top5]
          print(f"Top 5 most recent papers:")
          for p in top5:
            print(f"  [{p['published'][:10]}] {p['title'][:80]}")

          updated = datetime.datetime.now(datetime.timezone.utc).strftime("%-d %b %Y, %H:%M UTC")

          if not papers:
            with open("academia-summary.json", "w") as f:
              json.dump({"summary": "No matching academic papers found.", "updated": updated}, f)
            exit(0)

          paper_text = "\n\n".join(papers)

          prompt = (
            "You are a defence researcher specialising in small UAS (small commercial quadcopters and FPV drones). "
            "Based on the following 5 most recent arXiv papers, write a 3-5 sentence summary covering what these specific papers are about. "
            "Do not start with 'this week' or any time reference — just describe the papers directly. "
            "Do not generalise or describe broad themes — describe what each paper actually investigates, including specific methods, sensors, algorithms, or capabilities mentioned in the abstracts. "
            "Be factual, specific, and use plain English.\n\n"
            "Papers:\n" + paper_text
          )

          print("Calling OpenRouter API for academia summary...")
          req = urllib.request.Request(
            "https://openrouter.ai/api/v1/chat/completions",
            data=json.dumps({
              "model": "arcee-ai/trinity-large-preview:free",
              "messages": [{"role": "user", "content": prompt}],
              "max_tokens": 300,
              "temperature": 0.4
            }).encode(),
            headers={
              "Content-Type": "application/json",
              "Authorization": f"Bearer {api_key}",
              "HTTP-Referer": "https://github.com",
              "X-Title": "sUAS Academia Summariser"
            }
          )
          try:
            with urllib.request.urlopen(req) as r:
              data = json.loads(r.read())
            summary = data["choices"][0]["message"]["content"].strip()
            print(f"Academia summary: {summary[:120]}...")
          except urllib.error.HTTPError as e:
            print(f"API error: HTTP {e.code}: {e.reason}")
            print("Body:", e.read().decode())
            with open("academia-summary.json", "w") as f:
              json.dump({"summary": "Academia summary unavailable — API error.", "updated": updated}, f)
            exit(0)
          except Exception as e:
            print(f"API error: {e}")
            with open("academia-summary.json", "w") as f:
              json.dump({"summary": "Academia summary unavailable — API error.", "updated": updated}, f)
            exit(0)

          with open("academia-summary.json", "w") as f:
            json.dump({"summary": summary, "updated": updated}, f)
          print("academia-summary.json written successfully.")
          EOF

      - name: Commit summaries
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add summary.json academia-summary.json
          git diff --cached --quiet || git commit -m "chore: update summaries"
          git push
