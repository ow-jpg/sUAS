<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>sUAS database</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #1e1e1e;
      color: #f0f0f0;
      font-family: Courier, serif;
    }
    body { padding: 2rem; }

    .header-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.5rem;
      border-bottom: 2px solid #333;
      padding-bottom: 12px;
    }
    .header-container h1 {
      margin: 0;
      font-size: 1.6rem;
      letter-spacing: 1px;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 8px rgba(77, 163, 255, 0.15);
    }
    .header-info { text-align: right; font-size: 0.72rem; color: #888; display: flex; flex-direction: column; gap: 4px; }
    .status-indicator { color: #44ff44; font-weight: bold; }

    .col-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #444;
      margin-bottom: 1rem;
      height: 32px;
    }
    .col-header h2 {
      border: none;
      margin: 0;
      padding: 0;
      font-size: 1.1rem;
      text-transform: lowercase;
    }
    .refresh-btn {
      background: none;
      border: none;
      color: #4da3ff;
      cursor: pointer;
      font-family: Courier;
      font-size: 0.75rem;
      padding: 0;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .refresh-btn:hover { opacity: 1; text-decoration: underline; }

    .columns { display: flex; justify-content: space-between; gap: 2rem; align-items: flex-start; }
    .column { flex: 1; min-width: 0; }

    ul { list-style: none; padding: 0; }
    li { margin-bottom: 1rem; }
    a { text-decoration: none; color: #4da3ff; }
    a:hover { text-decoration: underline; }

    .scroll-wrap {
      max-height: 520px;
      overflow-y: auto;
      padding-right: 6px;
      -webkit-mask-image: linear-gradient(to bottom, black 99%, transparent 100%);
      mask-image: linear-gradient(to bottom, black 99%, transparent 100%);
    }
    .scroll-wrap::-webkit-scrollbar { width: 5px; }
    .scroll-wrap::-webkit-scrollbar-track { background: transparent; }
    .scroll-wrap::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 4px; }
    .scroll-wrap::-webkit-scrollbar-thumb:hover { background: #5a4370; }

    .x-fallback-header {
      font-size: 0.82rem;
      color: #888;
      margin-bottom: 0.75rem;
    }
    .x-fallback-header a { color: #4da3ff; }

    .account-card {
      display: flex;
      flex-direction: column;
      background: #252525;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 0.75rem 0.9rem;
      margin-bottom: 0.6rem;
      transition: border-color 0.15s ease, transform 0.12s ease;
    }
    .account-card:hover { border-color: #4da3ff; transform: translateY(-1px); }
    .account-card .handle { font-weight: 700; color: #4da3ff; font-size: 0.9rem; margin-bottom: 0.2rem; }
    .account-card .desc { font-size: 0.82rem; color: #aaa; line-height: 1.4; }
    .account-card .tag { font-size: 0.72rem; color: #7a5a96; margin-top: 0.25rem; }

    .card {
      background: #4B365F;
      border: 1px solid #3d2c4e;
      border-radius: 10px;
      padding: 0.9rem 1rem;
      transition: transform 0.12s ease;
      text-align: center;
    }
    .card:hover { transform: translateY(-1px); border-color: #5a4370; }
    .card a.title { display: inline-block; color: #fff; font-weight: 700; text-decoration: none; line-height: 1.35; }
    .card a.title:hover { text-decoration: underline; }

    .academia-card { background: #2e3d52; border: 1px solid #263547; }
    .academia-card:hover { border-color: #3a5472; }

    .meta { margin-top: 0.55rem; display: flex; flex-direction: column; align-items: center; gap: 0.35rem; }
    .meta .source { color: #f1e9fa; font-size: 0.9rem; font-weight: 600; }
    .meta .author { color: #e9dbf6; font-size: 0.88rem; }
    .meta .date { color: #d9c8ee; font-size: 0.86rem; }

    .academia-card .meta .source { color: #c8dff5; }
    .academia-card .meta .author { color: #b0cce8; font-size: 0.82rem; }
    .academia-card .meta .date { color: #96b8d8; font-size: 0.82rem; }

    .status {
      color: #cfcfcf;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin: 0.25rem 0 1rem 0;
      font-size: 0.95rem;
    }
    .status.error { border-color: #513333; background: #2a1e1e; color: #ffbcbc; }

    /* ── Summary boxes ── */
    .summary-outer { margin-bottom: 0; }
    .ai-summary-box {
      background: #261a33;
      border: 1px solid #3d2c4e;
      border-radius: 10px 10px 0 0;
      padding: 0.9rem 1rem 0.7rem 1rem;
      font-size: 0.84rem;
      line-height: 1.65;
      color: #e9dbf6;
      position: relative;
    }
    .academia-summary-box {
      background: #1a2233;
      border: 1px solid #2a3a52;
      border-radius: 10px 10px 0 0;
      padding: 0.9rem 1rem 0.7rem 1rem;
      font-size: 0.84rem;
      line-height: 1.65;
      color: #b8ccd4;
      position: relative;
    }
    .ai-summary-label { color: #b08fd4; font-size: 0.72rem; font-weight: bold; letter-spacing: 0.5px; margin-bottom: 0.6rem; }
    .academia-summary-label { color: #6aaabf; font-size: 0.72rem; font-weight: bold; letter-spacing: 0.5px; margin-bottom: 0.6rem; }

    .summary-text-wrap {
      overflow: hidden;
      transition: max-height 0.35s ease;
      max-height: 72px;
      position: relative;
    }
    .summary-text-wrap.expanded { max-height: 600px; }
    .summary-fade {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 32px;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .ai-summary-box .summary-fade { background: linear-gradient(to bottom, transparent, #261a33); }
    .academia-summary-box .summary-fade { background: linear-gradient(to bottom, transparent, #1a2233); }
    .summary-fade.hidden { opacity: 0; }

    .summary-toggle-btn {
      width: 100%;
      background: none;
      border: 1px solid #3d2c4e;
      border-top: none;
      border-radius: 0 0 10px 10px;
      color: #b08fd4;
      font-family: Courier;
      font-size: 0.72rem;
      padding: 0.3rem 0;
      cursor: pointer;
      opacity: 0.8;
      transition: opacity 0.2s, background 0.2s;
      letter-spacing: 0.5px;
    }
    .summary-toggle-btn.academia { border-color: #2a3a52; color: #6aaabf; }
    .summary-toggle-btn:hover { opacity: 1; background: rgba(255,255,255,0.03); }

    .summary-divider {
      border: none;
      border-top: 1px solid #2a2a2a;
      margin: 0.85rem 0;
    }

    @media (max-width: 900px) { .columns { flex-direction: column; } }
  </style>
</head>
<body>
  <div class="header-container">
    <h1>sUAS database</h1>
    <div class="header-info">
      <span class="status-indicator">● SYSTEM_ONLINE</span>
      <span id="sync-time">SYNC: --:--</span>
    </div>
  </div>

  <div class="columns">
    <!-- ──────────────────── TELEGRAM ──────────────────── -->
    <div class="column">
      <div class="col-header">
        <h2>telegram</h2>
        <span style="font-size:0.72rem; color:#888;">sUAS/FPV only · hourly · <span id="tg-updated"></span></span>
      </div>

      <div class="summary-outer" id="tg-summary-outer" style="display:none;">
        <div class="ai-summary-box" id="tg-summary-box" style="background:#1a2b1a; border-color:#2c4a2c;">
          <div class="ai-summary-label" id="tg-summary-label" style="color:#6abf6a;">AI SUMMARY</div>
          <div class="summary-text-wrap" id="tg-text-wrap">
            <div id="tg-summary-text"></div>
            <div class="summary-fade" id="tg-fade" style="background:linear-gradient(to bottom, transparent, #1a2b1a);"></div>
          </div>
        </div>
        <button class="summary-toggle-btn" id="tg-toggle-btn" onclick="toggleSummary('tg')" style="border-color:#2c4a2c; color:#6abf6a;">[ show more ▾ ]</button>
      </div>

      <hr class="summary-divider" id="tg-summary-divider" style="display:none;">
      <div id="tg-status" class="status" style="display:none;"></div>

      <div class="scroll-wrap" style="max-height:380px;">
        <div id="tg-feed"></div>
      </div>
    </div>

    <!-- ──────────────────── NEWS (unchanged) ──────────────────── -->
    <div class="column">
      <div class="col-header">
        <h2>news</h2>
      </div>

      <div class="summary-outer" id="news-summary-outer" style="display:none;">
        <div class="ai-summary-box" id="ai-summary-box">
          <div class="ai-summary-label" id="ai-summary-label">AI SUMMARY</div>
          <div class="summary-text-wrap" id="news-text-wrap">
            <div id="ai-summary-text"></div>
            <div class="summary-fade" id="news-fade"></div>
          </div>
        </div>
        <button class="summary-toggle-btn" id="news-toggle-btn" onclick="toggleSummary('news')">[ show more ▾ ]</button>
      </div>

      <hr class="summary-divider" id="summary-divider" style="display:none;">
      <div id="news-status" class="status" style="display:none;"></div>

      <div class="scroll-wrap" style="max-height:380px;">
        <ul id="feed2" class="news-list"></ul>
      </div>
    </div>

    <!-- ──────────────────── ACADEMIA (unchanged) ──────────────────── -->
    <div class="column">
      <div class="col-header">
        <h2>academia</h2>
      </div>

      <div class="summary-outer" id="academia-summary-outer" style="display:none;">
        <div class="academia-summary-box" id="academia-summary-box">
          <div class="academia-summary-label" id="academia-summary-label">AI SUMMARY</div>
          <div class="summary-text-wrap" id="academia-text-wrap">
            <div id="academia-summary-text"></div>
            <div class="summary-fade" id="academia-fade"></div>
          </div>
        </div>
        <button class="summary-toggle-btn academia" id="academia-toggle-btn" onclick="toggleSummary('academia')">[ show more ▾ ]</button>
      </div>

      <hr class="summary-divider" id="academia-summary-divider" style="display:none;">
      <div id="academia-status" class="status" style="display:none;"></div>

      <div class="scroll-wrap" style="max-height:380px;">
        <ul id="feed3" class="academia-list"></ul>
      </div>
    </div>
  </div>

  <script>
    function toggleSummary(which) {
      var wrapId  = which === 'news' ? 'news-text-wrap'  : which === 'tg' ? 'tg-text-wrap'  : 'academia-text-wrap';
      var btnId   = which === 'news' ? 'news-toggle-btn' : which === 'tg' ? 'tg-toggle-btn' : 'academia-toggle-btn';
      var fadeId  = which === 'news' ? 'news-fade'       : which === 'tg' ? 'tg-fade'       : 'academia-fade';
      var wrap = document.getElementById(wrapId);
      var btn = document.getElementById(btnId);
      var fade = document.getElementById(fadeId);
      var expanded = wrap.classList.contains('expanded');
      if (expanded) {
        wrap.classList.remove('expanded');
        btn.textContent = '[ show more ▾ ]';
        fade.classList.remove('hidden');
      } else {
        wrap.classList.add('expanded');
        btn.textContent = '[ show less ▴ ]';
        fade.classList.add('hidden');
      }
    }

    function formatDate(dateStr) {
      try {
        var d = new Date(dateStr);
        if (isNaN(d.getTime())) return null;
        return d.toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' });
      } catch (e) { return null; }
    }

    function updateSyncTime() {
      var now = new Date();
      var time = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
      document.getElementById('sync-time').textContent = 'SYNC: ' + time;
    }

    function showStatus(msg, isError, elId) {
      var el = document.getElementById(elId);
      if (!el) return;
      el.textContent = msg || '';
      el.className = isError ? 'status error' : 'status';
      el.style.display = msg ? 'block' : 'none';
      updateSyncTime();
    }

    function splitTitle(title) {
      if (!title) return { headline: '', publication: '' };
      var h = title.indexOf(' - ');
      if (h !== -1) return { headline: title.slice(0, h).trim(), publication: title.slice(h + 3).trim() };
      var e = title.indexOf(' — ');
      if (e !== -1) return { headline: title.slice(0, e).trim(), publication: title.slice(e + 3).trim() };
      return { headline: title.trim(), publication: '' };
    }

    function textOf(node, tag) {
      var els = node.getElementsByTagName(tag);
      return (els && els.length) ? (els[0].textContent || '').trim() : '';
    }

    var STOPWORDS = { a:1,an:1,the:1,in:1,on:1,at:1,to:1,of:1,and:1,or:1,for:1,is:1,are:1,was:1,were:1,its:1,it:1,as:1,by:1,with:1,from:1,that:1,this:1,be:1,has:1,have:1,after:1,over:1,says:1,say:1,new:1,amid:1,into:1,how:1,why:1,what:1,when:1,who:1 };

    function fingerprint(title) {
      return (title || '').toLowerCase()
        .replace(/[^a-z0-9\s]/g, '')
        .split(/\s+/)
        .filter(function(w) { return w.length > 2 && !STOPWORDS[w]; });
    }

    function jaccard(a, b) {
      var setA = {}, all = {}, inter = 0, union = 0;
      a.forEach(function(w) { setA[w] = 1; all[w] = 1; });
      b.forEach(function(w) { all[w] = 1; });
      Object.keys(all).forEach(function(w) { if (setA[w] && b.indexOf(w) !== -1) inter++; union++; });
      return union === 0 ? 0 : inter / union;
    }

    function dedupeItems(items) {
      var seenLinks = {}, seenFPs = [], out = [];
      (items || []).forEach(function(it) {
        var key = (it.link || '').split('?')[0];
        if (seenLinks[key]) return;
        seenLinks[key] = true;
        var fp = fingerprint(it.title);
        if (seenFPs.some(function(s) { return jaccard(fp, s) > 0.6; })) return;
        seenFPs.push(fp);
        out.push(it);
      });
      return out;
    }

    function sortDesc(items) {
      return (items || []).slice().sort(function(a, b) {
        return new Date(b.pubDateISO || 0) - new Date(a.pubDateISO || 0);
      });
    }

    /* ──────────────────── NEWS FEED (unchanged) ──────────────────── */
    var NEWS_CACHE_KEY = 'news_cache_v16';
    var ACAD_CACHE_KEY = 'acad_cache_v4';
    var CACHE_TTL_MS = 2 * 60 * 60 * 1000;

    function saveCache(key, items) {
      try {
        localStorage.setItem(key, JSON.stringify(items || []));
        localStorage.setItem(key + '_t', String(Date.now()));
      } catch(e) {}
    }

    function loadCache(key) {
      try {
        var raw = localStorage.getItem(key);
        var when = parseInt(localStorage.getItem(key + '_t') || '0', 10);
        return { items: raw ? JSON.parse(raw) : [], when: when, fresh: when && (Date.now() - when < CACHE_TTL_MS) };
      } catch(e) { return { items: [], when: 0, fresh: false }; }
    }

    function loadSummary() {
      fetch('summary.json?_=' + Date.now())
        .then(function(r) { return r.json(); })
        .then(function(d) {
          if (!d || !d.summary) return;
          document.getElementById('ai-summary-label').textContent = 'AI SUMMARY · ' + (d.updated || '');
          document.getElementById('ai-summary-text').textContent = d.summary;
          document.getElementById('news-summary-outer').style.display = 'block';
          document.getElementById('summary-divider').style.display = 'block';
        })
        .catch(function() {});
    }

    function loadAcademiaSummary() {
      fetch('academia-summary.json?_=' + Date.now())
        .then(function(r) { return r.json(); })
        .then(function(d) {
          if (!d || !d.summary) return;
          document.getElementById('academia-summary-label').textContent = 'AI SUMMARY · ' + (d.updated || '');
          document.getElementById('academia-summary-text').textContent = d.summary;
          document.getElementById('academia-summary-outer').style.display = 'block';
          document.getElementById('academia-summary-divider').style.display = 'block';
        })
        .catch(function() {});
    }

    var TITLE_BLOCKLIST = [
      'shahed','geran','tb2','bayraktar','akinci','mq-9','reaper','global hawk',
      'long-range drone','strategic drone','drone light show','drone show',
      'amazon drone','drone photography','best drone','drone review',
      'firefighting drone','agriculture drone','medical drone',
      'package delivery','delivery drone'
    ];
    function isTitleBlocked(t) {
      var l=(t||'').toLowerCase();
      return TITLE_BLOCKLIST.some(function(x){return l.indexOf(x)!==-1;});
    }

    var QUERY_A = '("FPV drone" OR "FPV attack" OR "FPV strike" OR "FPV drones" OR "small drone" OR "quadcopter") AND (military OR combat OR warfare OR Ukraine OR battlefield) after:2025-12-31 when:7d';
    var QUERY_B = '("small UAS" OR sUAS OR "commercial quadcopter" OR "DJI") AND (military OR defense OR warfare OR "counter-drone" OR "anti-drone") after:2025-12-31 when:7d';
    var FEEDS_TIER1 = [
      { url: 'https://news.google.com/rss/search?q=' + encodeURIComponent(QUERY_A) + '&hl=en&gl=US&ceid=US:en' },
      { url: 'https://news.google.com/rss/search?q=' + encodeURIComponent(QUERY_B) + '&hl=en&gl=US&ceid=US:en' },
    ];

    async function fetchOneFeed(f) {
      try {
        var proxy = 'https://corsproxy.io/?' + encodeURIComponent(f.url + '&_=' + Date.now());
        var res = await fetch(proxy);
        var xml = new DOMParser().parseFromString(await res.text(), 'text/xml');
        var out = [], items = xml.getElementsByTagName('item');
        for (var i = 0; i < Math.min(items.length, 30); i++) {
          var it = items[i];
          var rawTitle = textOf(it, 'title');
          var split = splitTitle(rawTitle);
          out.push({
            title: split.headline,
            link: textOf(it,'link'),
            publication: split.publication,
            pubDateISO: textOf(it,'pubDate')
          });
        }
        return out;
      } catch(e) { return []; }
    }

    function renderNews(items) {
      var list = document.getElementById('feed2');
      list.innerHTML = '';
      var filtered = (items||[]).filter(function(it){ return !isTitleBlocked(it.title); });
      var ordered = sortDesc(dedupeItems(filtered));
      var n = Math.min(ordered.length, 20);
      for (var i = 0; i < n; i++) {
        var it = ordered[i];
        var li = document.createElement('li');
        li.className = 'card';
        li.innerHTML = '<a class="title" href="'+it.link+'" target="_blank">'+it.title+'</a>'
          + '<div class="meta"><div class="source">'+it.publication+'</div>'
          + '<div class="date">'+formatDate(it.pubDateISO)+'</div></div>';
        list.appendChild(li);
      }
    }

    async function loadNews() {
      var cache = loadCache(NEWS_CACHE_KEY);
      if (cache.items.length) renderNews(cache.items);
      var all = [];
      var results = await Promise.allSettled(FEEDS_TIER1.map(fetchOneFeed));
      results.forEach(function(r){ if (r.status==='fulfilled') all = all.concat(r.value); });
      saveCache(NEWS_CACHE_KEY, all);
      renderNews(all);
      showStatus('', false, 'news-status');
    }

    /* ──────────────────── ACADEMIA FEED (unchanged) ──────────────────── */
    var ARXIV_QUERIES = [
      { q: 'all:"FPV drone" OR all:"FPV strike" AND (all:military OR all:warfare)' },
      { q: 'all:"small drones" OR all:"quadcopter" AND (all:combat OR all:battlefield)' },
      { q: 'all:"counter-UAS" OR all:"anti-drone" AND (all:defense OR all:military)' }
    ];

    async function fetchArxiv(queryObj) {
      try {
        var url = 'https://export.arxiv.org/api/query?search_query=' + encodeURIComponent(queryObj.q) + '&max_results=10&sortBy=submittedDate&sortOrder=descending';
        var res = await fetch('https://corsproxy.io/?' + encodeURIComponent(url));
        var xml = new DOMParser().parseFromString(await res.text(), 'text/xml');
        var entries = xml.getElementsByTagName('entry'), out = [];
        for (var j = 0; j < entries.length; j++) {
          var entry = entries[j];
          var authorNames = [];
          var authors = entry.getElementsByTagName('author');
          for (var k=0; k<Math.min(authors.length,2); k++) authorNames.push(textOf(authors[k],'name'));
          out.push({
            title: textOf(entry, 'title').replace(/\s+/g, ' '),
            link: textOf(entry, 'id'),
            publication: 'arXiv',
            author: authorNames.join(', '),
            pubDateISO: textOf(entry, 'published')
          });
        }
        return out;
      } catch(e) { return []; }
    }

    function renderAcademia(items) {
      var list = document.getElementById('feed3');
      list.innerHTML = '';
      var ordered = sortDesc(dedupeItems(items || []));
      for (var i = 0; i < Math.min(ordered.length, 20); i++) {
        var it = ordered[i];
        var li = document.createElement('li');
        li.className = 'card academia-card';
        li.innerHTML = '<a class="title" href="'+it.link+'" target="_blank">'+it.title+'</a>'
          + '<div class="meta"><div class="source">arXiv</div>'
          + '<div class="author">'+it.author+'</div>'
          + '<div class="date">'+formatDate(it.pubDateISO)+'</div></div>';
        list.appendChild(li);
      }
    }

    async function loadAcademia() {
      var cache = loadCache(ACAD_CACHE_KEY);
      if (cache.items.length) renderAcademia(cache.items);
      var combined = [];
      var results = await Promise.allSettled(ARXIV_QUERIES.map(fetchArxiv));
      results.forEach(function(r){ if (r.status==='fulfilled') combined = combined.concat(r.value); });
      saveCache(ACAD_CACHE_KEY, combined);
      renderAcademia(combined);
      showStatus('', false, 'academia-status');
    }

    /* ──────────────────── TELEGRAM (reads telegram.json + telegram-summary.json) ──────────────────── */

    function renderTelegramFeed(posts) {
      var host = document.getElementById('tg-feed');
      if (!host) return;
      host.innerHTML = '';
      if (!posts || posts.length === 0) {
        showStatus('No matching posts found yet. The workflow may not have run yet.', false, 'tg-status');
        return;
      }
      showStatus('', false, 'tg-status');
      posts.forEach(function(p) {
        var card = document.createElement('div');
        card.className = 'account-card';
        var dateStr = formatDate(p.pubDate) || '';
        var snippet = (p.snippet || p.title || '').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        var link = p.link || ('https://t.me/s/' + p.channel);
        card.innerHTML =
          '<a class="handle" href="https://t.me/s/' + p.channel + '" target="_blank" rel="noopener">@' + p.channel + '</a>' +
          '<a class="desc" href="' + link + '" target="_blank" rel="noopener" style="color:#ccc;text-decoration:none;">' + snippet + '</a>' +
          '<span class="tag">' + dateStr + '</span>';
        host.appendChild(card);
      });
    }

    function loadTelegramFeed() {
      fetch('telegram.json?_=' + Date.now())
        .then(function(r) { return r.json(); })
        .then(function(d) {
          if (d.updated) {
            var el = document.getElementById('tg-updated');
            if (el) el.textContent = 'updated ' + d.updated;
          }
          renderTelegramFeed(d.posts || []);
        })
        .catch(function() {
          showStatus('telegram.json not found — run the workflow in GitHub Actions to generate it.', true, 'tg-status');
        });
    }

    function loadTelegramSummary() {
      fetch('telegram-summary.json?_=' + Date.now())
        .then(function(r) { return r.json(); })
        .then(function(d) {
          if (!d || !d.summary) return;
          document.getElementById('tg-summary-label').textContent = 'AI SUMMARY · ' + (d.updated || '');
          document.getElementById('tg-summary-text').textContent = d.summary;
          document.getElementById('tg-summary-outer').style.display = 'block';
          document.getElementById('tg-summary-divider').style.display = 'block';
        })
        .catch(function() {});
    }

    /* ──────────────────── BOOTSTRAP ──────────────────── */
    updateSyncTime();
    loadSummary();
    loadAcademiaSummary();
    loadTelegramSummary();
    loadNews();
    loadAcademia();
    loadTelegramFeed();
  </script>
</body>
</html>
