<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>sUAS database</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #1e1e1e;
      color: #f0f0f0;
      font-family: Courier, serif;
    }

    body { padding: 2rem; }

    h1 { font-size: 1.6rem; margin-bottom: 2rem; }

    h2 {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid #444;
      padding-bottom: 0.5rem;
      text-transform: lowercase;
    }

    .columns { display: flex; justify-content: space-between; gap: 2rem; }
    .column { flex: 1; min-width: 0; }

    ul { list-style: none; padding: 0; }
    li { margin-bottom: 1rem; }

    a { text-decoration: none; color: #4da3ff; }
    a:hover { text-decoration: underline; }

    /* --- Scrollable news list: ~3 cards visible --- */
    .news-scroll-wrap {
      max-height: 520px;   /* roughly 3 cards tall */
      overflow-y: auto;
      padding-right: 6px;  /* space so scrollbar doesn't overlap cards */

      /* subtle fade at the bottom to hint there's more */
      -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
      mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
    }

    /* Scrollbar styling */
    .news-scroll-wrap::-webkit-scrollbar { width: 5px; }
    .news-scroll-wrap::-webkit-scrollbar-track { background: transparent; }
    .news-scroll-wrap::-webkit-scrollbar-thumb { background: #5a4370; border-radius: 4px; }
    .news-scroll-wrap::-webkit-scrollbar-thumb:hover { background: #7a5a96; }

    .news-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.8rem;
    }

    .card {
      background: #4B365F;
      border: 1px solid #3d2c4e;
      border-radius: 10px;
      padding: 0.9rem 1rem;
      transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.2s ease;
      text-align: center;
    }

    .card:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.35);
      border-color: #5a4370;
    }

    .card a.title {
      display: inline-block;
      color: #ffffff;
      font-weight: 700;
      text-decoration: none;
      line-height: 1.35;
    }

    .card a.title:hover { text-decoration: underline; }

    .meta {
      margin-top: 0.55rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
    }

    .meta .source { color: #f1e9fa; font-size: 0.9rem; font-weight: 600; }
    .meta .author { color: #e9dbf6; font-size: 0.88rem; }
    .meta .date   { color: #d9c8ee; font-size: 0.86rem; }

    .status {
      color: #cfcfcf;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin: 0.25rem 0 1rem 0;
      font-size: 0.95rem;
    }
    .status.error { border-color: #513333; background: #2a1e1e; color: #ffbcbc; }

    @media (max-width: 900px) { .columns { flex-direction: column; } }
  </style>
</head>
<body>

  <noscript style="color:#ffbcbc;">This page requires JavaScript to load feeds.</noscript>

  <h1>sUAS database</h1>

  <div class="columns">
    <div class="column">
      <h2>social</h2>
      <ul id="feed1"></ul>
    </div>

    <div class="column">
      <h2>news</h2>
      <div id="news-status" class="status" style="display:none;"></div>
      <!-- scroll wrapper constrains height; news-list sits inside it -->
      <div class="news-scroll-wrap">
        <ul id="feed2" class="news-list"></ul>
      </div>
    </div>

    <div class="column">
      <h2>academia</h2>
      <ul id="feed3"></ul>
    </div>
  </div>

  <script>
    var QUERY_A =
      '("FPV drone" OR "FPV attack" OR "FPV strike" OR "drone strike" OR ' +
      '"small drone" OR "commercial drone" OR sUAS OR quadcopter OR "drone warfare")' +
      ' AND (military OR combat OR warfare OR Ukraine OR army OR battlefield)' +
      ' when:7d';

    var QUERY_B =
      '("drone swarm" OR "counter-drone" OR "counter-UAS" OR "anti-drone" OR ' +
      '"drone technology" OR "FPV" OR "small UAS" OR "unmanned aerial")' +
      ' AND (military OR defense OR warfare OR weapon OR army)' +
      ' when:7d';

    var FEED_URL_A = 'https://news.google.com/rss/search?q=' + encodeURIComponent(QUERY_A);
    var FEED_URL_B = 'https://news.google.com/rss/search?q=' + encodeURIComponent(QUERY_B);

    var TITLE_BLOCKLIST = [
      'shahed', 'tb-2', 'tb2', 'bayraktar', 'mq-9', 'reaper',
      'wing loong', 'hale drone', 'male drone', 'cruise missile',
      'ballistic missile', 'predator drone', 'global hawk',
      'racing drone championship', 'drone light show', 'drone delivery pizza',
      'amazon drone', 'drone photography', 'drone racing league',
      'consumer drone review', 'best drones to buy'
    ];

    function isTitleBlocked(title) {
      var lower = (title || '').toLowerCase();
      return TITLE_BLOCKLIST.some(function(term) { return lower.indexOf(term) !== -1; });
    }

    /* ---------------- Helpers ---------------- */
    function formatDate(dateStr) {
      try {
        var d = new Date(dateStr);
        if (isNaN(d.getTime())) return null;
        return d.toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' });
      } catch (e) { return null; }
    }

    function showStatus(message, isError) {
      var el = document.getElementById('news-status');
      if (!el) return;
      el.textContent = message || '';
      el.className = isError ? 'status error' : 'status';
      el.style.display = message ? 'block' : 'none';
    }

    function splitTitle(title) {
      if (!title) return { headline: '', publication: '' };
      var h = title.indexOf(' - ');
      if (h !== -1) return { headline: title.slice(0, h).trim(), publication: title.slice(h + 3).trim() };
      var e = title.indexOf(' — ');
      if (e !== -1) return { headline: title.slice(0, e).trim(), publication: title.slice(e + 3).trim() };
      return { headline: title.trim(), publication: '' };
    }

    function textOf(node, tag) {
      var els = node.getElementsByTagName(tag);
      return (els && els.length) ? (els[0].textContent || '').trim() : '';
    }

    /* ---------------- Deduplication ---------------- */
    var STOPWORDS = {
      a:1,an:1,the:1,in:1,on:1,at:1,to:1,of:1,and:1,or:1,for:1,
      is:1,are:1,was:1,were:1,its:1,it:1,as:1,by:1,with:1,from:1,
      that:1,this:1,be:1,has:1,have:1,after:1,over:1,says:1,say:1,
      new:1,amid:1,into:1,how:1,why:1,what:1,when:1,who:1
    };

    function fingerprint(title) {
      return (title || '').toLowerCase().replace(/[^a-z0-9\s]/g, '').split(/\s+/)
        .filter(function(w) { return w.length > 2 && !STOPWORDS[w]; });
    }

    function jaccard(a, b) {
      var setA = {}, all = {}, inter = 0, union = 0;
      a.forEach(function(w) { setA[w] = 1; all[w] = 1; });
      b.forEach(function(w) { all[w] = 1; });
      Object.keys(all).forEach(function(w) { if (setA[w] && b.indexOf(w) !== -1) inter++; union++; });
      return union === 0 ? 0 : inter / union;
    }

    function dedupeItems(items) {
      var seenLinks = {}, seenFPs = [], out = [];
      (items || []).forEach(function(it) {
        var key = (it.link || '').split('?')[0];
        if (seenLinks[key]) return;
        seenLinks[key] = true;
        var fp = fingerprint(it.title);
        if (seenFPs.some(function(s) { return jaccard(fp, s) > 0.6; })) return;
        seenFPs.push(fp);
        out.push(it);
      });
      return out;
    }

    /* ---------------- Cache ---------------- */
    var CACHE_KEY = 'news_cache_v9_20260303';
    var CACHE_TIME_KEY = CACHE_KEY + '_time';
    var CACHE_TTL_MS = 2 * 60 * 60 * 1000;

    function saveCache(items) {
      try { localStorage.setItem(CACHE_KEY, JSON.stringify(items || [])); localStorage.setItem(CACHE_TIME_KEY, String(Date.now())); } catch (e) {}
    }

    function loadCache() {
      try {
        var raw = localStorage.getItem(CACHE_KEY);
        var when = parseInt(localStorage.getItem(CACHE_TIME_KEY) || '0', 10);
        return { items: raw ? JSON.parse(raw) : [], when: when, fresh: when && (Date.now() - when < CACHE_TTL_MS) };
      } catch (e) { return { items: [], when: 0, fresh: false }; }
    }

    /* ---------------- Sort & render ---------------- */
    function sortDesc(items) {
      return (items || []).slice().sort(function(a, b) {
        return new Date(b.pubDateISO || 0) - new Date(a.pubDateISO || 0);
      });
    }

    function renderItems(items, elementId, maxItems) {
      var list = document.getElementById(elementId);
      list.innerHTML = '';
      var filtered = (items || []).filter(function(it) { return !isTitleBlocked(it.title); });
      var ordered = sortDesc(dedupeItems(filtered));
      var n = Math.min(ordered.length, maxItems || 20);

      if (!n) {
        var empty = document.createElement('li');
        empty.className = 'card';
        empty.textContent = 'No items available right now.';
        list.appendChild(empty);
        return;
      }

      for (var i = 0; i < n; i++) {
        var it = ordered[i];
        var li = document.createElement('li');
        li.className = 'card';
        var dateText = it.pubDateISO ? formatDate(it.pubDateISO) : null;
        var html = '<a class="title" href="' + (it.link || '#') + '" target="_blank" rel="noopener noreferrer">' + (it.title || 'Untitled') + '</a>';
        html += '<div class="meta">';
        if (it.publication) html += '<div class="source">' + it.publication + '</div>';
        if (it.author)      html += '<div class="author">' + it.author + '</div>';
        if (dateText)       html += '<div class="date">' + dateText + '</div>';
        html += '</div>';
        li.innerHTML = html;
        list.appendChild(li);
      }
    }

    /* ---------------- Proxy fetch ---------------- */
    function buildProxyUrls(feedUrl) {
      var aug = feedUrl + '&hl=en&gl=US&ceid=US:en&_=' + Date.now();
      return [
        'https://cors.isomorphic-git.org/' + aug,
        'https://corsproxy.io/?' + aug,
        'https://api.allorigins.win/raw?url=' + encodeURIComponent(aug)
      ];
    }

    async function tryFetchXML(feedUrl) {
      var urls = buildProxyUrls(feedUrl);
      for (var i = 0; i < urls.length; i++) {
        try {
          var res = await fetch(urls[i]);
          if (!res.ok) continue;
          var xml = new DOMParser().parseFromString(await res.text(), 'text/xml');
          if (xml.getElementsByTagName('parsererror').length) continue;
          return xml;
        } catch (e) {}
      }
      throw new Error('All XML proxies failed');
    }

    async function fetchRss2Json(feedUrl, count) {
      var url = 'https://api.rss2json.com/v1/api.json?count=' + (count || 50) +
                '&rss_url=' + encodeURIComponent(feedUrl + '&hl=en&gl=US&ceid=US:en&_=' + Date.now());
      var res = await fetch(url);
      if (!res.ok) throw new Error('rss2json HTTP ' + res.status);
      return res.json();
    }

    function itemsFromXml(xmlDoc, limit) {
      var out = [], items = xmlDoc.getElementsByTagName('item');
      var n = Math.min(items.length, limit || 50);
      for (var i = 0; i < n; i++) {
        var it = items[i];
        var rawTitle = textOf(it, 'title') || 'Untitled';
        var sourceNodes = it.getElementsByTagName('source');
        var source = sourceNodes.length ? (sourceNodes[0].textContent || '').trim() : '';
        var split = splitTitle(rawTitle);
        var author = '';
        var creators = it.getElementsByTagName('dc:creator');
        if (creators.length) author = (creators[0].textContent || '').trim();
        if (!author) author = textOf(it, 'author');
        out.push({ title: split.headline || 'Untitled', link: textOf(it, 'link') || '#', publication: source || split.publication || '', author: author, pubDateISO: textOf(it, 'pubDate') || '' });
      }
      return out;
    }

    function itemsFromRss2Json(json, limit) {
      var out = [], arr = (json && json.items) || [];
      var n = Math.min(arr.length, limit || 50);
      for (var i = 0; i < n; i++) {
        var it = arr[i] || {};
        var split = splitTitle(it.title || '');
        out.push({ title: split.headline || 'Untitled', link: it.link || '#', publication: it.author || split.publication || '', author: it.author || '', pubDateISO: it.pubDate || '' });
      }
      return out;
    }

    async function fetchOneFeed(feedUrl) {
      try { return itemsFromXml(await tryFetchXML(feedUrl), 50); }
      catch (e) {
        console.warn('XML failed, falling back to rss2json:', e);
        return itemsFromRss2Json(await fetchRss2Json(feedUrl, 50), 50);
      }
    }

    async function loadNews() {
      var list = document.getElementById('feed2');
      showStatus('Loading news…', false);
      list.innerHTML = '<li class="card" style="opacity:.8">Loading…</li>';

      try {
        var results = await Promise.allSettled([fetchOneFeed(FEED_URL_A), fetchOneFeed(FEED_URL_B)]);
        var combined = [];
        results.forEach(function(r) { if (r.status === 'fulfilled') combined = combined.concat(r.value); });
        if (!combined.length) throw new Error('Both feeds returned no items');
        saveCache(combined);
        renderItems(combined, 'feed2', 20);
        showStatus('', false);
      } catch (err) {
        console.error('Feed load failed:', err);
        var cache = loadCache();
        if (cache.items && cache.items.length) {
          renderItems(cache.items, 'feed2', 20);
          showStatus('Showing cached news from ' + (cache.when ? new Date(cache.when).toLocaleString() : 'earlier') + ' (live update failed).', true);
        } else {
          list.innerHTML = '<li class="card">Could not load feed. Try again later.</li>';
          showStatus('Could not load news (network issue or rate limiting). Will retry automatically.', true);
        }
      }
    }

    loadNews();
    setInterval(loadNews, 300000);
  </script>

</body>
</html>
