<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>sUAS database</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #1e1e1e;
      color: #f0f0f0;
      font-family: Courier, serif;
    }

    body { padding: 2rem; }

    h1 { font-size: 1.6rem; margin-bottom: 2rem; }

    h2 {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid #444;
      padding-bottom: 0.5rem;
      text-transform: lowercase;
    }

    .columns { display: flex; justify-content: space-between; gap: 2rem; }
    .column { flex: 1; min-width: 0; }

    ul { list-style: none; padding: 0; }
    li { margin-bottom: 1rem; }

    a { text-decoration: none; color: #4da3ff; }
    a:hover { text-decoration: underline; }

    .news-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.8rem;
      padding-right: 0.25rem;
      max-height: none;
      overflow: visible;
    }

    .card {
      background: #4B365F;
      border: 1px solid #3d2c4e;
      border-radius: 10px;
      padding: 0.9rem 1rem;
      transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.2s ease;
      text-align: center;
    }

    .card:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.35);
      border-color: #5a4370;
    }

    .card a.title {
      display: inline-block;
      color: #ffffff;
      font-weight: 700;
      text-decoration: none;
      line-height: 1.35;
    }

    .card a.title:hover { text-decoration: underline; }

    .meta {
      margin-top: 0.55rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
    }

    .meta .source { color: #f1e9fa; font-size: 0.9rem; font-weight: 600; }
    .meta .author { color: #e9dbf6; font-size: 0.88rem; }
    .meta .date   { color: #d9c8ee; font-size: 0.86rem; }

    .status {
      color: #cfcfcf;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin: 0.25rem 0 1rem 0;
      font-size: 0.95rem;
    }
    .status.error { border-color: #513333; background: #2a1e1e; color: #ffbcbc; }

    @media (max-width: 900px) { .columns { flex-direction: column; } }
  </style>
</head>
<body>

  <noscript style="color:#ffbcbc;">This page requires JavaScript to load feeds.</noscript>

  <h1>sUAS database</h1>

  <div class="columns">
    <div class="column">
      <h2>social</h2>
      <ul id="feed1"></ul>
    </div>

    <div class="column">
      <h2>news</h2>
      <div id="news-status" class="status" style="display:none;"></div>
      <ul id="feed2" class="news-list"></ul>
    </div>

    <div class="column">
      <h2>academia</h2>
      <ul id="feed3"></ul>
    </div>
  </div>

  <script>
    /*
      QUERY_A — combat/operational FPV & small drone news
      QUERY_B — capability/technology development news

      Source whitelist uses Google News `source:` operator to restrict to reputable outlets.
      Exclusions remove Shahed-class, TB2, and MALE/HALE platforms.
      Results are merged, title-similarity deduped (Jaccard), then sorted newest-first.
    */

    var SOURCE_WHITELIST =
      '(source:reuters.com OR source:bbc.com OR source:bbc.co.uk OR ' +
      'source:apnews.com OR source:theguardian.com OR source:politico.com OR ' +
      'source:defenseone.com OR source:breakingdefense.com OR ' +
      'source:thedrive.com OR source:militarytimes.com OR ' +
      'source:janes.com OR source:rferl.org OR source:kyivindependent.com OR ' +
      'source:ft.com OR source:wsj.com OR source:forbes.com OR ' +
      'source:wired.com OR source:aviationweek.com OR source:taskandpurpose.com)';

    var EXCLUSIONS =
      ' -Shahed -"Shahed-136" -"Shahed-131" -TB2 -Bayraktar' +
      ' -MQ-9 -Reaper -"Wing Loong" -HALE -MALE' +
      ' -"cruise missile" -"ballistic missile"';

    var QUERY_A =
      '("FPV drone" OR "FPV attack" OR "FPV strike" OR "small drone" OR sUAS OR "commercial drone" OR quadcopter)' +
      ' AND (military OR combat OR Ukraine OR warfare OR battlefield OR "front line")' +
      ' AND ' + SOURCE_WHITELIST +
      EXCLUSIONS +
      ' when:7d';

    var QUERY_B =
      '("drone swarm" OR "counter-UAS" OR "counter-drone" OR "drone technology" OR "drone capability" OR "small UAS")' +
      ' AND (military OR defense OR warfare OR army)' +
      ' AND ' + SOURCE_WHITELIST +
      EXCLUSIONS +
      ' when:7d';

    var FEED_URL_A = 'https://news.google.com/rss/search?q=' + encodeURIComponent(QUERY_A);
    var FEED_URL_B = 'https://news.google.com/rss/search?q=' + encodeURIComponent(QUERY_B);

    /* ---------------- Helpers ---------------- */
    function formatDate(dateStr) {
      try {
        var d = new Date(dateStr);
        if (isNaN(d.getTime())) return null;
        return d.toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' });
      } catch (e) { return null; }
    }

    function showStatus(message, isError) {
      var el = document.getElementById('news-status');
      if (!el) return;
      el.textContent = message || '';
      el.className = isError ? 'status error' : 'status';
      el.style.display = message ? 'block' : 'none';
    }

    function splitTitle(title) {
      if (!title) return { headline: '', publication: '' };
      var hyphenIdx = title.indexOf(' - ');
      if (hyphenIdx !== -1) {
        return { headline: title.slice(0, hyphenIdx).trim(), publication: title.slice(hyphenIdx + 3).trim() };
      }
      var emDashIdx = title.indexOf(' — ');
      if (emDashIdx !== -1) {
        return { headline: title.slice(0, emDashIdx).trim(), publication: title.slice(emDashIdx + 3).trim() };
      }
      return { headline: title.trim(), publication: '' };
    }

    function textOf(node, tag) {
      var els = node.getElementsByTagName(tag);
      if (els && els.length) return (els[0].textContent || '').trim();
      return '';
    }

    /* ---------------- Title-similarity deduplication ----------------
       Strips stopwords, builds word-set fingerprints, drops items
       where Jaccard similarity with any already-seen title exceeds 0.6.
    */
    var STOPWORDS = {
      a:1, an:1, the:1, in:1, on:1, at:1, to:1, of:1, and:1, or:1,
      for:1, is:1, are:1, was:1, were:1, its:1, it:1, as:1, by:1,
      with:1, from:1, that:1, this:1, be:1, has:1, have:1, after:1,
      over:1, says:1, say:1, new:1, amid:1, into:1
    };

    function titleFingerprint(title) {
      return (title || '')
        .toLowerCase()
        .replace(/[^a-z0-9\s]/g, '')
        .split(/\s+/)
        .filter(function(w) { return w.length > 2 && !STOPWORDS[w]; });
    }

    function jaccardSimilarity(a, b) {
      var setA = {}, intersection = 0, union = 0;
      a.forEach(function(w) { setA[w] = 1; });
      var allKeys = {};
      a.forEach(function(w) { allKeys[w] = 1; });
      b.forEach(function(w) { allKeys[w] = 1; });
      Object.keys(allKeys).forEach(function(w) {
        if (setA[w] && b.indexOf(w) !== -1) intersection++;
        union++;
      });
      return union === 0 ? 0 : intersection / union;
    }

    function dedupeItems(items) {
      var seenLinks = {};
      var seenFingerprints = [];
      var out = [];
      (items || []).forEach(function(it) {
        var linkKey = (it.link || '').split('?')[0];
        if (seenLinks[linkKey]) return;
        seenLinks[linkKey] = true;

        var fp = titleFingerprint(it.title);
        var isDupe = seenFingerprints.some(function(seen) {
          return jaccardSimilarity(fp, seen) > 0.6;
        });
        if (isDupe) return;

        seenFingerprints.push(fp);
        out.push(it);
      });
      return out;
    }

    /* ---------------- Cache ---------------- */
    var CACHE_KEY = 'news_cache_v8_20260303';
    var CACHE_TIME_KEY = CACHE_KEY + '_time';
    var CACHE_TTL_MS = 2 * 60 * 60 * 1000;

    function saveCache(items) {
      try {
        localStorage.setItem(CACHE_KEY, JSON.stringify(items || []));
        localStorage.setItem(CACHE_TIME_KEY, String(Date.now()));
      } catch (e) {}
    }

    function loadCache() {
      try {
        var raw = localStorage.getItem(CACHE_KEY);
        var when = parseInt(localStorage.getItem(CACHE_TIME_KEY) || '0', 10);
        var items = raw ? JSON.parse(raw) : [];
        return { items: items, when: when, fresh: when && (Date.now() - when < CACHE_TTL_MS) };
      } catch (e) {
        return { items: [], when: 0, fresh: false };
      }
    }

    /* ---------------- Sorting ---------------- */
    function sortByDateDesc(items) {
      return (items || []).slice().sort(function(a, b) {
        var ta = a && a.pubDateISO ? new Date(a.pubDateISO).getTime() : 0;
        var tb = b && b.pubDateISO ? new Date(b.pubDateISO).getTime() : 0;
        return tb - ta;
      });
    }

    /* ---------------- Rendering ---------------- */
    function renderItems(items, elementId, maxItems) {
      var list = document.getElementById(elementId);
      list.innerHTML = '';
      var ordered = sortByDateDesc(dedupeItems(items));
      var n = Math.min(ordered.length, maxItems || 20);

      if (!n) {
        var emptyLi = document.createElement('li');
        emptyLi.className = 'card';
        emptyLi.textContent = 'No items available right now.';
        list.appendChild(emptyLi);
        return;
      }

      for (var i = 0; i < n; i++) {
        var it = ordered[i];
        var li = document.createElement('li');
        li.className = 'card';
        var dateText = it.pubDateISO ? formatDate(it.pubDateISO) : null;
        var html = '<a class="title" href="' + (it.link || '#') + '" target="_blank" rel="noopener noreferrer">' + (it.title || 'Untitled') + '</a>';
        html += '<div class="meta">';
        if (it.publication) html += '<div class="source">' + it.publication + '</div>';
        if (it.author) html += '<div class="author">' + it.author + '</div>';
        if (dateText) html += '<div class="date">' + dateText + '</div>';
        html += '</div>';
        li.innerHTML = html;
        list.appendChild(li);
      }
    }

    /* ---------------- Proxy fetch ---------------- */
    function buildProxyUrls(feedUrl) {
      var aug = feedUrl + '&hl=en&gl=US&ceid=US:en&_=' + Date.now();
      return [
        'https://cors.isomorphic-git.org/' + aug,
        'https://corsproxy.io/?' + aug,
        'https://api.allorigins.win/raw?url=' + encodeURIComponent(aug)
      ];
    }

    async function tryFetchXML(feedUrl) {
      var urls = buildProxyUrls(feedUrl);
      for (var i = 0; i < urls.length; i++) {
        try {
          var res = await fetch(urls[i]);
          if (!res.ok) continue;
          var text = await res.text();
          var xml = new DOMParser().parseFromString(text, 'text/xml');
          if (xml.getElementsByTagName('parsererror').length) continue;
          return xml;
        } catch (e) {}
      }
      throw new Error('All XML proxies failed');
    }

    async function fetchRss2Json(feedUrl, count) {
      var url = 'https://api.rss2json.com/v1/api.json?count=' + (count || 50) +
                '&rss_url=' + encodeURIComponent(feedUrl + '&hl=en&gl=US&ceid=US:en&_=' + Date.now());
      var res = await fetch(url);
      if (!res.ok) throw new Error('rss2json HTTP ' + res.status);
      return await res.json();
    }

    /* ---------------- Normalise ---------------- */
    function itemsFromXml(xmlDoc, limit) {
      var out = [];
      var items = xmlDoc.getElementsByTagName('item');
      var n = Math.min(items.length, limit || 50);
      for (var i = 0; i < n; i++) {
        var it = items[i];
        var rawTitle = textOf(it, 'title') || 'Untitled';
        var link = textOf(it, 'link') || '#';
        var pubDate = textOf(it, 'pubDate') || '';
        var sourceNodes = it.getElementsByTagName('source');
        var source = (sourceNodes && sourceNodes.length) ? (sourceNodes[0].textContent || '').trim() : '';
        var split = splitTitle(rawTitle);
        var author = '';
        var creators = it.getElementsByTagName('dc:creator');
        if (creators && creators.length) author = (creators[0].textContent || '').trim();
        if (!author) author = textOf(it, 'author');
        out.push({ title: split.headline || 'Untitled', link: link, publication: source || split.publication || '', author: author, pubDateISO: pubDate });
      }
      return out;
    }

    function itemsFromRss2Json(json, limit) {
      var out = [];
      var arr = (json && json.items) ? json.items : [];
      var n = Math.min(arr.length, limit || 50);
      for (var i = 0; i < n; i++) {
        var it = arr[i];
        var rawTitle = it && it.title ? it.title : 'Untitled';
        var split = splitTitle(rawTitle);
        out.push({
          title: split.headline || 'Untitled',
          link: it && it.link ? it.link : '#',
          publication: (it && it.author) ? it.author : (split.publication || ''),
          author: (it && it.author) ? it.author : '',
          pubDateISO: (it && it.pubDate) ? it.pubDate : ''
        });
      }
      return out;
    }

    /* ---------------- Fetch one feed ---------------- */
    async function fetchOneFeed(feedUrl) {
      try {
        var xml = await tryFetchXML(feedUrl);
        return itemsFromXml(xml, 50);
      } catch (e) {
        console.warn('XML failed, falling back to rss2json:', e);
        var json = await fetchRss2Json(feedUrl, 50);
        return itemsFromRss2Json(json, 50);
      }
    }

    /* ---------------- Controller ---------------- */
    async function loadNews() {
      var list = document.getElementById('feed2');
      showStatus('Loading news…', false);
      list.innerHTML = '<li class="card" style="opacity:.8">Loading…</li>';

      try {
        var results = await Promise.allSettled([
          fetchOneFeed(FEED_URL_A),
          fetchOneFeed(FEED_URL_B)
        ]);

        var combined = [];
        results.forEach(function(r) {
          if (r.status === 'fulfilled') combined = combined.concat(r.value);
        });

        if (!combined.length) throw new Error('Both feeds returned no items');

        saveCache(combined);
        renderItems(combined, 'feed2', 20);
        showStatus('', false);
      } catch (err) {
        console.error('Feed load failed:', err);
        var cache = loadCache();
        if (cache.items && cache.items.length) {
          renderItems(cache.items, 'feed2', 20);
          var whenStr = cache.when ? new Date(cache.when).toLocaleString() : 'earlier';
          showStatus('Showing cached news from ' + whenStr + ' (live update failed).', true);
        } else {
          list.innerHTML = '';
          var li = document.createElement('li');
          li.className = 'card';
          li.textContent = 'Could not load feed. Try again later.';
          list.appendChild(li);
          showStatus('Could not load news (network issue or rate limiting). Will retry automatically.', true);
        }
      }
    }

    loadNews();
    setInterval(loadNews, 300000);
  </script>

</body>
</html>
