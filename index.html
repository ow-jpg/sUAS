<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>sUAS database</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #1e1e1e;
      color: #f0f0f0;
      font-family: Courier, serif;
    }

    body {
      padding: 2rem;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 2rem;
    }

    h2 {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid #444;
      padding-bottom: 0.5rem;
      text-transform: lowercase;
    }

    .columns {
      display: flex;
      justify-content: space-between;
      gap: 2rem;
    }

    .column {
      flex: 1;
      min-width: 0; /* prevents overflow with grid children */
    }

    ul {
      list-style: none;
      padding: 0;
      max-height: 500px;
      overflow-y: auto; /* scroll like a rolling list */
    }

    li {
      margin-bottom: 1rem;
    }

    a {
      text-decoration: none;
      color: #4da3ff;
    }

    a:hover {
      text-decoration: underline;
    }

    /* --- Card styles for news feed --- */
    .news-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.8rem; /* space between cards */
      padding-right: 0.25rem; /* tiny room for scrollbar */
    }

    .card {
      background: #4B365F;              /* <-- YOUR COLOR */
      border: 1px solid #3d2c4e;        /* slightly darker border for definition */
      border-radius: 10px;
      padding: 0.9rem 1rem;
      transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.2s ease;
    }

    .card:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.35);
      border-color: #5a4370;            /* subtle highlight on hover */
    }

    .card a.title {
      display: inline-block;
      color: #ffffff;                    /* strong contrast on purple */
      font-weight: 700;
      text-decoration: none;
      line-height: 1.35;
    }

    .card a.title:hover {
      text-decoration: underline;
    }

    .card .meta {
      margin-top: 0.45rem;               /* puts source/date on a separate line under title */
      color: #e9dbf6;                    /* light lilac for secondary text */
      font-size: 0.86rem;
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .card .dot {
      opacity: 0.7;
    }

    /* Simple inline status message style */
    .status {
      color: #cfcfcf;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin: 0.25rem 0 1rem 0;
      font-size: 0.95rem;
    }

    .status.error {
      border-color: #513333;
      background: #2a1e1e;
      color: #ffbcbc;
    }

    /* Responsive: stack columns on narrow screens */
    @media (max-width: 900px) {
      .columns {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <noscript style="color:#ffbcbc;">This page requires JavaScript to load feeds.</noscript>

  <h1>sUAS database</h1>

  <div class="columns">
    <div class="column">
      <h2>social</h2>
      <ul id="feed1"></ul>
    </div>

    <div class="column">
      <h2>news</h2>
      <div id="news-status" class="status" style="display:none;"></div>
      <ul id="feed2" class="news-list"></ul>
    </div>

    <div class="column">
      <h2>academia</h2>
      <ul id="feed3"></ul>
    </div>
  </div>

  <script>
    // --------- Helpers (simple / widely supported) ---------
    function formatDate(dateStr) {
      try {
        var d = new Date(dateStr);
        if (isNaN(d.getTime())) return null;
        return d.toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' });
      } catch (e) {
        return null;
      }
    }

    function showStatus(message, isError) {
      var el = document.getElementById('news-status');
      if (!el) return;
      el.textContent = message || '';
      el.className = isError ? 'status error' : 'status';
      el.style.display = message ? 'block' : 'none';
    }

    // --------- Core feed loader ---------
    async function loadRSS(feedUrl, elementId) {
      var proxy = "https://api.rss2json.com/v1/api.json?rss_url=";
      var encodedUrl = encodeURIComponent(feedUrl);
      var list = document.getElementById(elementId);

      // Loading state
      if (elementId === "feed2") showStatus('Loading news…', false);
      list.innerHTML = (elementId === "feed2")
        ? '<li class="card" aria-busy="true" style="opacity:.8">Loading…</li>'
        : '';

      try {
        var res = await fetch(proxy + encodedUrl);
        if (!res || !res.ok) throw new Error('Network error ' + (res ? res.status : ''));

        var data = await res.json();
        list.innerHTML = ""; // clear

        if (elementId === "feed2") showStatus('', false);

        var isNews = (elementId === "feed2");
        var items = (data && data.items) ? data.items : [];

        if (!items.length) {
          var emptyLi = document.createElement('li');
          emptyLi.className = isNews ? 'card' : '';
          emptyLi.textContent = 'No items available right now.';
          list.appendChild(emptyLi);
          return;
        }

        items.forEach(function(item) {
          var li = document.createElement('li');

          var title = item && item.title ? item.title : 'Untitled';
          var link = item && item.link ? item.link : '#';
          var author = (item && item.author) ? item.author : ''; // Do not show feed title
          var dateText = (item && item.pubDate) ? formatDate(item.pubDate) : null;

          if (isNews) {
            li.className = 'card';

            // Title (first line)
            var html = '<a class="title" href="' + link + '" target="_blank" rel="noopener noreferrer">' + title + '</a>';

            // Source/Author on its own line; include date if available. If both absent, no meta row.
            if (author || dateText) {
              html += '<div class="meta">';
              if (author) html += '<span>' + author + '</span>';
              if (author && dateText) html += '<span class="dot">•</span>';
              if (dateText) html += '<span>' + dateText + '</span>';
              html += '</div>';
            }

            // No excerpt/body text

            li.innerHTML = html;
          } else {
            // Simple list for other columns
            li.innerHTML =
              '<a href="' + link + '" target="_blank" rel="noopener noreferrer">' + title + '</a>';
          }

          list.appendChild(li);
        });

      } catch (err) {
        console.error('RSS load error:', err);
        list.innerHTML = "";
        var li = document.createElement('li');
        li.className = (elementId === "feed2") ? 'card' : '';
        li.textContent = 'Could not load feed. Try again later.';
        list.appendChild(li);
        if (elementId === "feed2") {
          showStatus('Could not load news (network issue or rate limiting). Will retry automatically.', true);
        }
      }
    }

    // --------- Configure & refresh ---------
    // Google News RSS query
    var newsFeed = "https://news.google.com/rss/search?q=sUAS+military+operations+OR+armed+drones";

    function refreshFeeds() {
      loadRSS(newsFeed, "feed2");
      // When ready, you can add:
      // loadRSS(feedUrlForSocial, "feed1");
      // loadRSS(feedUrlForAcademia, "feed3");
    }

    refreshFeeds(); // initial load
    setInterval(refreshFeeds, 300000); // every 5 minutes
  </script>

</body>
</html>
