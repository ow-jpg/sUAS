name: Daily News Summary

on:
  schedule:
    - cron: '0 23 * * *'
    - cron: '0 22 * * 1'
  workflow_dispatch:

jobs:
  summarise:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch RSS and summarise news
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python3 << 'EOF'
          import urllib.request, urllib.parse, urllib.error, xml.etree.ElementTree as ET, json, os, datetime

          api_key = os.environ.get("OPENROUTER_API_KEY", "")
          print(f"API key present: {bool(api_key)} (length {len(api_key)})")

          QUERY_A = '("FPV drone" OR "FPV attack" OR "FPV strike" OR "FPV drones" OR "small drone" OR "quadcopter") AND (military OR combat OR warfare OR Ukraine OR battlefield) after:2025-12-31 when:7d'
          QUERY_B = '("small UAS" OR sUAS OR "commercial quadcopter" OR "DJI") AND (military OR defense OR warfare OR "counter-drone" OR "anti-drone") after:2025-12-31 when:7d'

          FEEDS = [
            f"https://news.google.com/rss/search?q={urllib.parse.quote(QUERY_A)}&hl=en&gl=US&ceid=US:en",
            f"https://news.google.com/rss/search?q={urllib.parse.quote(QUERY_B)}&hl=en&gl=US&ceid=US:en",
          ]

          BLOCK = ['shahed','geran','tb2','bayraktar','akinci','mq-9','reaper','global hawk','long-range drone','strategic drone','drone light show','drone show','amazon drone','drone photography','best drone','drone review','firefighting drone','agriculture drone','medical drone','package delivery','delivery drone']

          headlines = []
          articles = []
          for url in FEEDS:
            try:
              print(f"Fetching: {url[:80]}...")
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              with urllib.request.urlopen(req, timeout=15) as r:
                raw = r.read()
              tree = ET.fromstring(raw)
              count = 0
              for item in tree.iter('item'):
                t = (item.findtext('title') or '').strip()
                tl = t.lower()
                if not t: continue
                if any(b in tl for b in BLOCK): continue
                link = (item.findtext('link') or '').strip()
                pub_date = (item.findtext('pubDate') or '').strip()
                headline = t
                publication = ''
                if ' - ' in t:
                  headline = t[:t.rfind(' - ')].strip()
                  publication = t[t.rfind(' - ')+3:].strip()
                headlines.append(headline)
                articles.append({
                  'title': headline,
                  'link': link,
                  'publication': publication,
                  'pubDateISO': pub_date,
                })
                count += 1
              print(f"  -> {count} headlines from this feed")
            except Exception as e:
              print(f"  Feed error: {e}")

          # Dedupe articles by title, preserve order
          seen_titles = set()
          deduped_articles = []
          for a in articles:
            if a['title'] not in seen_titles:
              seen_titles.add(a['title'])
              deduped_articles.append(a)

          # Write news.json for the frontend to consume directly
          with open("news.json", "w") as f:
            json.dump({"articles": deduped_articles, "updated": datetime.datetime.now(datetime.timezone.utc).strftime("%-d %b %Y, %H:%M UTC")}, f)
          print(f"news.json written — {len(deduped_articles)} articles.")

          headlines = list(dict.fromkeys(headlines))[:30]
          print(f"Total headlines after dedup: {len(headlines)}")

          updated = datetime.datetime.now(datetime.timezone.utc).strftime("%-d %b %Y, %H:%M UTC")

          if not headlines:
            with open("summary.json", "w") as f:
              json.dump({"summary": "No matching sUAS headlines found in today's feeds.", "updated": updated}, f)
            exit(0)

          headline_text = "\n".join(f"- {h}" for h in headlines)
          print("Headlines:\n" + headline_text)

          prompt = (
            "You are a defence analyst tracking small UAS (small commercial quadcopters and FPV drones only). "
            "Based strictly on the following recent news headlines, write a 3-5 sentence summary. "
            "Only include events and developments that occurred in 2026 — ignore anything referencing events from 2025 or earlier. "
            "Start with the phrase 'News articles published within the previous 24 hours have outlined'. "
            "Focus only on specific developments, fine details, and new information mentioned in these headlines — do not give broad overviews, do not summarise the wider conflict, do not draw sweeping conclusions. "
            "If a headline mentions a specific incident, weapon, tactic, or figure, include it. "
            "Be factual, specific, and concise.\n\n"
            "Headlines:\n" + headline_text
          )

          print("Calling OpenRouter API...")
          req = urllib.request.Request(
            "https://openrouter.ai/api/v1/chat/completions",
            data=json.dumps({
              "model": "arcee-ai/trinity-large-preview:free",
              "messages": [{"role": "user", "content": prompt}],
              "max_tokens": 300,
              "temperature": 0.4
            }).encode(),
            headers={
              "Content-Type": "application/json",
              "Authorization": f"Bearer {api_key}",
              "HTTP-Referer": "https://github.com",
              "X-Title": "sUAS News Summariser"
            }
          )
          try:
            with urllib.request.urlopen(req) as r:
              data = json.loads(r.read())
            summary = data["choices"][0]["message"]["content"].strip()
            print(f"Summary: {summary[:120]}...")
          except urllib.error.HTTPError as e:
            print(f"API error: HTTP {e.code}: {e.reason}")
            print("Body:", e.read().decode())
            with open("summary.json", "w") as f:
              json.dump({"summary": "Summary unavailable today — API error.", "updated": updated}, f)
            exit(0)
          except Exception as e:
            print(f"API error: {e}")
            with open("summary.json", "w") as f:
              json.dump({"summary": "Summary unavailable today — API error.", "updated": updated}, f)
            exit(0)

          with open("summary.json", "w") as f:
            json.dump({"summary": summary, "updated": updated}, f)
          print("summary.json written successfully.")
          EOF

      - name: Fetch arXiv and summarise academia (Mondays only)
        if: github.event.schedule == '0 22 * * 1' || github.event_name == 'workflow_dispatch'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python3 << 'EOF'
          import urllib.request, urllib.parse, urllib.error, xml.etree.ElementTree as ET, json, os, datetime

          api_key = os.environ.get("OPENROUTER_API_KEY", "")

          ARXIV_QUERIES = [
            'all:"FPV drone" OR all:"FPV strike" AND (all:military OR all:warfare)',
            'all:"small drones" OR all:"quadcopter" AND (all:combat OR all:battlefield)',
            'all:"counter-UAS" OR all:"anti-drone" AND (all:defense OR all:military)',
          ]

          papers_raw = []
          for q in ARXIV_QUERIES:
            try:
              url = f"https://export.arxiv.org/api/query?search_query={urllib.parse.quote(q)}&max_results=10&sortBy=submittedDate&sortOrder=descending"
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              with urllib.request.urlopen(req, timeout=15) as r:
                raw = r.read()
              tree = ET.fromstring(raw)
              for entry in tree.iter('{http://www.w3.org/2005/Atom}entry'):
                title = (entry.findtext('{http://www.w3.org/2005/Atom}title') or '').strip().replace('\n', ' ')
                abstract = (entry.findtext('{http://www.w3.org/2005/Atom}summary') or '').strip().replace('\n', ' ')[:300]
                published = (entry.findtext('{http://www.w3.org/2005/Atom}published') or '').strip()
                if title:
                  papers_raw.append({"title": title, "abstract": abstract, "published": published})
              print(f"  -> {len(papers_raw)} papers so far")
            except Exception as e:
              print(f"  arXiv error: {e}")

          seen_titles = set()
          papers_deduped = []
          for p in papers_raw:
            if p["title"] not in seen_titles:
              seen_titles.add(p["title"])
              papers_deduped.append(p)

          papers_deduped.sort(key=lambda x: x["published"], reverse=True)
          top5 = papers_deduped[:5]
          papers = [f"Title: {p['title']}\nAbstract: {p['abstract']}" for p in top5]
          print(f"Top 5 most recent papers:")
          for p in top5:
            print(f"  [{p['published'][:10]}] {p['title'][:80]}")

          updated = datetime.datetime.now(datetime.timezone.utc).strftime("%-d %b %Y, %H:%M UTC")

          if not papers:
            with open("academia-summary.json", "w") as f:
              json.dump({"summary": "No matching academic papers found.", "updated": updated}, f)
            exit(0)

          paper_text = "\n\n".join(papers)

          prompt = (
            "You are a defence researcher specialising in small UAS (small commercial quadcopters and FPV drones). "
            "Based on the following 5 most recent arXiv papers, write a 3-5 sentence summary covering the discoveries/topics of what they're about/what they discover - do not go through each paper one by one, provide a holistic, top-down view. "
            "Do not start with 'this week' or any time reference — just describe the papers directly. "
            "Do not generalise or describe broad themes — describe what the papers actually investigate, including specific methods, sensors, algorithms, or capabilities mentioned in the abstracts. "
            "Be factual, specific, and use plain English.\n\n"
            "Papers:\n" + paper_text
          )

          print("Calling OpenRouter API for academia summary...")
          req = urllib.request.Request(
            "https://openrouter.ai/api/v1/chat/completions",
            data=json.dumps({
              "model": "arcee-ai/trinity-large-preview:free",
              "messages": [{"role": "user", "content": prompt}],
              "max_tokens": 300,
              "temperature": 0.4
            }).encode(),
            headers={
              "Content-Type": "application/json",
              "Authorization": f"Bearer {api_key}",
              "HTTP-Referer": "https://github.com",
              "X-Title": "sUAS Academia Summariser"
            }
          )
          try:
            with urllib.request.urlopen(req) as r:
              data = json.loads(r.read())
            summary = data["choices"][0]["message"]["content"].strip()
            print(f"Academia summary: {summary[:120]}...")
          except urllib.error.HTTPError as e:
            print(f"API error: HTTP {e.code}: {e.reason}")
            print("Body:", e.read().decode())
            with open("academia-summary.json", "w") as f:
              json.dump({"summary": "Academia summary unavailable — API error.", "updated": updated}, f)
            exit(0)
          except Exception as e:
            print(f"API error: {e}")
            with open("academia-summary.json", "w") as f:
              json.dump({"summary": "Academia summary unavailable — API error.", "updated": updated}, f)
            exit(0)

          with open("academia-summary.json", "w") as f:
            json.dump({"summary": summary, "updated": updated}, f)
          print("academia-summary.json written successfully.")
          EOF

      - name: Generate combined intelligence summary
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python3 << 'EOF'
          import urllib.request, urllib.error, json, os, datetime

          api_key = os.environ.get("OPENROUTER_API_KEY", "")
          today = datetime.datetime.now(datetime.timezone.utc)
          today_str = today.strftime("%-d %b %Y")
          updated = today.strftime("%-d %b %Y, %H:%M UTC")

          def call_api(prompt, max_tokens=700):
            req = urllib.request.Request(
              "https://openrouter.ai/api/v1/chat/completions",
              data=json.dumps({
                "model": "arcee-ai/trinity-large-preview:free",
                "messages": [{"role": "user", "content": prompt}],
                "max_tokens": max_tokens,
                "temperature": 0.4
              }).encode(),
              headers={
                "Content-Type": "application/json",
                "Authorization": f"Bearer {api_key}",
                "HTTP-Referer": "https://github.com",
                "X-Title": "sUAS Intelligence Summariser"
              }
            )
            with urllib.request.urlopen(req, timeout=30) as r:
              data = json.loads(r.read())
            return data["choices"][0]["message"]["content"].strip()

          # ── Load today's sources ─────────────────────────────────────────────
          news_summary = ""
          try:
            with open("summary.json") as f:
              news_summary = json.load(f).get("summary", "")
            print(f"News summary: {len(news_summary)} chars")
          except Exception as e:
            print(f"No summary.json: {e}")

          telegram_posts = []
          try:
            with open("telegram.json") as f:
              telegram_posts = json.load(f).get("posts", [])[:15]
            print(f"Telegram posts: {len(telegram_posts)}")
          except Exception as e:
            print(f"No telegram.json: {e}")

          academia_summary = ""
          try:
            with open("academia-summary.json") as f:
              academia_summary = json.load(f).get("summary", "")
            print(f"Academia summary: {len(academia_summary)} chars")
          except Exception as e:
            print(f"No academia-summary.json: {e}")

          # ── Load history and monthly digest ──────────────────────────────────
          history = []
          try:
            with open("summary-history.json") as f:
              history = json.load(f)
            print(f"History: {len(history)} entries")
          except:
            print("No history yet — starting fresh.")

          monthly_digest = ""
          try:
            with open("monthly-digest.json") as f:
              monthly_digest = json.load(f).get("digest", "")
            print(f"Monthly digest: {len(monthly_digest)} chars")
          except:
            print("No monthly digest yet.")

          # ── Build and run combined summary prompt ────────────────────────────
          if not news_summary and not telegram_posts:
            print("No source material — skipping combined summary.")
            combined = "Insufficient data for combined summary today."
          elif not api_key:
            combined = "Combined summary unavailable — API key not set."
          else:
            tg_text = "\n".join(
              f"- [@{p['channel']}] {p.get('snippet_en') or p.get('snippet', '')}"
              for p in telegram_posts
            ) if telegram_posts else ""

            history_text = "\n\n".join(
              f"=== {e['date']} ===\n{e['summary']}"
              for e in history[-7:][::-1]
            ) if history else ""

            prompt_parts = [
              "You are a senior defence analyst writing a daily intelligence briefing on small UAS "
              "(small commercial quadcopters and FPV drones) in active combat, with a focus on Ukraine "
              "and any other conflicts where these systems are deployed.",
              "",
              "Write a detailed analytical briefing of 8-12 sentences. Your briefing must cover:",
              "- Specific operational incidents and battlefield use reported today",
              "- Tactical, technological, or doctrinal developments evident in today's reports",
              "- How today's picture fits the recent trend — note continuity or change from prior days",
              "- Any patterns, escalations, or shifts emerging over the past week",
            ]

            if academia_summary:
              prompt_parts.append("- Relevant academic or research developments where applicable")

            prompt_parts += [
              "",
              "Be specific: name locations, units, weapons, or figures where the sources mention them. "
              "Do not pad with generalities. Write in clear, analytical prose as a continuous briefing — no bullet points.",
              "",
            ]

            if news_summary:
              prompt_parts += ["TODAY'S NEWS SUMMARY:", news_summary, ""]
            if tg_text:
              prompt_parts += ["TODAY'S FIELD REPORTS (Telegram, translated):", tg_text, ""]
            if academia_summary:
              prompt_parts += ["RECENT ACADEMIC RESEARCH CONTEXT:", academia_summary, ""]
            if monthly_digest:
              prompt_parts += ["THIS MONTH'S BACKGROUND CONTEXT:", monthly_digest, ""]
            if history_text:
              prompt_parts += [
                "RECENT DAILY SUMMARIES (use for trend analysis — do not simply repeat):",
                history_text, ""
              ]

            prompt = "\n".join(prompt_parts)
            print(f"Prompt: {len(prompt)} chars. Calling API...")

            try:
              combined = call_api(prompt, max_tokens=700)
              print(f"Combined summary: {combined[:120]}...")
            except Exception as e:
              print(f"Combined summary error: {e}")
              combined = "Combined summary unavailable today — API error."

          with open("combined-summary.json", "w") as f:
            json.dump({"summary": combined, "updated": updated}, f)
          print("combined-summary.json written.")

          # ── Update 7-day rolling history ──────────────────────────────────────
          # Strip any existing entry for today (handles re-runs cleanly)
          history = [e for e in history if e.get("date") != today_str]
          history.append({"date": today_str, "summary": combined})
          history = history[-7:]  # keep last 7 days only
          with open("summary-history.json", "w") as f:
            json.dump(history, f, indent=2)
          print(f"summary-history.json updated — {len(history)} entries.")

          # ── Regenerate monthly digest on 1st of each month ───────────────────
          is_first_of_month = today.day == 1
          should_make_digest = (is_first_of_month or not monthly_digest) and len(history) >= 3 and api_key

          if should_make_digest:
            prev_month = (today.replace(day=1) - datetime.timedelta(days=1))
            prev_month_name = prev_month.strftime("%B %Y")
            print(f"Regenerating monthly digest for {prev_month_name}...")

            history_for_digest = "\n\n".join(
              f"=== {e['date']} ===\n{e['summary']}"
              for e in history
            )

            digest_prompt = (
              f"You are a senior defence analyst. Based on the following daily intelligence summaries, "
              f"write a concise monthly digest of 6-8 sentences covering the key trends, developments, "
              f"and shifts observed in small UAS (FPV drones and commercial quadcopters) use in combat. "
              f"Focus on patterns, escalations, new tactics, and notable turning points. "
              f"This digest will serve as background context for future daily analysis — be analytical and specific.\n\n"
              f"Daily summaries:\n{history_for_digest}"
            )

            try:
              digest = call_api(digest_prompt, max_tokens=500)
              with open("monthly-digest.json", "w") as f:
                json.dump({"digest": digest, "month": prev_month_name, "updated": updated}, f)
              print(f"monthly-digest.json written for {prev_month_name}.")
            except Exception as e:
              print(f"Monthly digest error: {e}")
          EOF

      - name: Commit summaries
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          for f in news.json summary.json academia-summary.json combined-summary.json summary-history.json monthly-digest.json; do
            [ -f "$f" ] && git add "$f" || echo "Skipping $f (not found)"
          done
          git diff --cached --quiet || git commit -m "chore: update summaries"
          git pull --rebase origin main
          git push
