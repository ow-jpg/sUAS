name: Daily News Summary

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  summarise:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch RSS and summarise
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python3 << 'EOF'
          import urllib.request, urllib.parse, urllib.error, xml.etree.ElementTree as ET, json, os, datetime

          api_key = os.environ.get("OPENROUTER_API_KEY", "")
          print(f"API key present: {bool(api_key)} (length {len(api_key)})")

          QUERY_A = '"FPV drone" OR "FPV strike" OR "small drone" OR "quadcopter" military combat warfare Ukraine'
          QUERY_B = '"small UAS" OR "sUAS" OR "counter-drone" OR "anti-drone" military defense'

          FEEDS = [
            f"https://news.google.com/rss/search?q={urllib.parse.quote(QUERY_A)}&hl=en&gl=US&ceid=US:en",
            f"https://news.google.com/rss/search?q={urllib.parse.quote(QUERY_B)}&hl=en&gl=US&ceid=US:en",
          ]

          BLOCK = ['shahed','tb2','bayraktar','mq-9','reaper','global hawk','drone light show','drone show','amazon drone','drone photography','best drone','delivery drone']

          headlines = []
          for url in FEEDS:
            try:
              print(f"Fetching: {url[:80]}...")
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              with urllib.request.urlopen(req, timeout=15) as r:
                raw = r.read()
              tree = ET.fromstring(raw)
              count = 0
              for item in tree.iter('item'):
                t = (item.findtext('title') or '').strip()
                tl = t.lower()
                if not t: continue
                if any(b in tl for b in BLOCK): continue
                if ' - ' in t:
                  t = t[:t.rfind(' - ')].strip()
                headlines.append(t)
                count += 1
              print(f"  -> {count} headlines from this feed")
            except Exception as e:
              print(f"  Feed error: {e}")

          headlines = list(dict.fromkeys(headlines))[:30]
          print(f"Total headlines after dedup: {len(headlines)}")

          updated = datetime.datetime.now(datetime.timezone.utc).strftime("%-d %b %Y, %H:%M UTC")

          if not headlines:
            with open("summary.json", "w") as f:
              json.dump({"summary": "No matching sUAS headlines found in today's feeds.", "updated": updated}, f)
            exit(0)

          headline_text = "\n".join(f"- {h}" for h in headlines)
          print("Headlines:\n" + headline_text)

          prompt = (
            "You are a concise defence analyst specialising in small UAS (unmanned aerial systems). "
            "Given these recent sUAS news headlines, write a clear 3-5 sentence intelligence summary "
            "covering the key themes and developments. Be factual, direct, and use plain English.\n\n"
            "Headlines:\n" + headline_text
          )

          print("Calling OpenRouter API...")
          req = urllib.request.Request(
            "https://openrouter.ai/api/v1/chat/completions",
            data=json.dumps({
              "model": "mistralai/mistral-7b-instruct:free",
              "messages": [{"role": "user", "content": prompt}],
              "max_tokens": 300,
              "temperature": 0.4
            }).encode(),
            headers={
              "Content-Type": "application/json",
              "Authorization": f"Bearer {api_key}",
              "HTTP-Referer": "https://github.com",
              "X-Title": "sUAS News Summariser"
            }
          )
          try:
            with urllib.request.urlopen(req) as r:
              data = json.loads(r.read())
            summary = data["choices"][0]["message"]["content"].strip()
            print(f"Summary: {summary[:120]}...")
          except urllib.error.HTTPError as e:
            print(f"API error: HTTP {e.code}: {e.reason}")
            print("Body:", e.read().decode())
            with open("summary.json", "w") as f:
              json.dump({"summary": "Summary unavailable today — API error.", "updated": updated}, f)
            exit(0)
          except Exception as e:
            print(f"API error: {e}")
            with open("summary.json", "w") as f:
              json.dump({"summary": "Summary unavailable today — API error.", "updated": updated}, f)
            exit(0)

          with open("summary.json", "w") as f:
            json.dump({"summary": summary, "updated": updated}, f)
          print("summary.json written successfully.")
          EOF

      - name: Commit summary.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add summary.json
          git diff --cached --quiet || git commit -m "chore: daily sUAS news summary"
          git push
