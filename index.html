<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>sUAS database</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #1e1e1e;
      color: #f0f0f0;
      font-family: Courier, serif;
    }

    body { padding: 2rem; }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 2rem;
    }

    h2 {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid #444;
      padding-bottom: 0.5rem;
      text-transform: lowercase;
    }

    .columns {
      display: flex;
      justify-content: space-between;
      gap: 2rem;
    }

    .column { flex: 1; min-width: 0; }

    ul {
      list-style: none;
      padding: 0;
      max-height: 500px;
      overflow-y: auto;
    }

    li { margin-bottom: 1rem; }

    a { text-decoration: none; color: #4da3ff; }
    a:hover { text-decoration: underline; }

    /* --- News card styles --- */
    .news-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.8rem;
      padding-right: 0.25rem;
    }

    .card {
      background: #4B365F;              /* your color */
      border: 1px solid #3d2c4e;        /* slightly darker border for definition */
      border-radius: 10px;
      padding: 0.9rem 1rem;
      transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.2s ease;
      text-align: center;               /* center all content in the card */
    }

    .card:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.35);
      border-color: #5a4370;            /* subtle highlight on hover */
    }

    .card a.title {
      display: inline-block;
      color: #ffffff;                    /* strong contrast on purple */
      font-weight: 700;
      text-decoration: none;
      line-height: 1.35;
    }

    .card a.title:hover { text-decoration: underline; }

    .meta {
      margin-top: 0.55rem;
      display: flex;
      flex-direction: column;            /* stack lines: publication, author, date */
      align-items: center;
      gap: 0.35rem;
    }

    .meta .source {
      color: #f1e9fa;                    /* publication line */
      font-size: 0.9rem;
      font-weight: 600;
    }

    .meta .author {
      color: #e9dbf6;                    /* author line */
      font-size: 0.88rem;
    }

    .meta .date {
      color: #d9c8ee;                    /* date line */
      font-size: 0.86rem;
    }

    .status {
      color: #cfcfcf;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin: 0.25rem 0 1rem 0;
      font-size: 0.95rem;
    }

    .status.error {
      border-color: #513333;
      background: #2a1e1e;
      color: #ffbcbc;
    }

    @media (max-width: 900px) {
      .columns { flex-direction: column; }
    }
  </style>
</head>
<body>

  <noscript style="color:#ffbcbc;">This page requires JavaScript to load feeds.</noscript>

  <h1>sUAS database</h1>

  <div class="columns">
    <div class="column">
      <h2>social</h2>
      <ul id="feed1"></ul>
    </div>

    <div class="column">
      <h2>news</h2>
      <div id="news-status" class="status" style="display:none;"></div>
      <ul id="feed2" class="news-list"></ul>
    </div>

    <div class="column">
      <h2>academia</h2>
      <ul id="feed3"></ul>
    </div>
  </div>

  <script>
    // ---------------- Helpers ----------------
    function formatDate(dateStr) {
      try {
        var d = new Date(dateStr);
        if (isNaN(d.getTime())) return null;
        return d.toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' });
      } catch (e) { return null; }
    }

    function showStatus(message, isError) {
      var el = document.getElementById('news-status');
      if (!el) return;
      el.textContent = message || '';
      el.className = isError ? 'status error' : 'status';
      el.style.display = message ? 'block' : 'none';
    }

    // Split a Google News style title "Headline - Outlet" (FIRST hyphen) or "Headline — Outlet"
    // Returns {headline, publication}
    function splitTitle(title) {
      if (!title) return { headline: '', publication: '' };
      var hyphenIdx = title.indexOf(' - ');
      if (hyphenIdx !== -1) {
        return {
          headline: title.slice(0, hyphenIdx).trim(),
          publication: title.slice(hyphenIdx + 3).trim()
        };
      }
      var emDashIdx = title.indexOf(' — ');
      if (emDashIdx !== -1) {
        return {
          headline: title.slice(0, emDashIdx).trim(),
          publication: title.slice(emDashIdx + 3).trim()
        };
      }
      return { headline: title.trim(), publication: '' };
    }

    // Extract text of the first matching subelement
    function textOf(node, tag) {
      var els = node.getElementsByTagName(tag);
      if (els && els.length) return (els[0].textContent || '').trim();
      return '';
    }

    // ---------------- RSS loader (prefers direct RSS via AllOrigins; falls back to rss2json) ----------------
    async function fetchRSSXmlViaAllOrigins(feedUrl) {
      // "raw" returns the raw RSS XML; avoids CORS issues
      var url = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(feedUrl);
      var res = await fetch(url);
      if (!res.ok) throw new Error('AllOrigins HTTP ' + res.status);
      var xmlText = await res.text();
      var parser = new DOMParser();
      var xml = parser.parseFromString(xmlText, 'text/xml');
      var parserErr = xml.getElementsByTagName('parsererror');
      if (parserErr && parserErr.length) throw new Error('XML parse error');
      return xml;
    }

    async function fetchRSSViaRss2Json(feedUrl, count) {
      var url = 'https://api.rss2json.com/v1/api.json?count=' + (count || 30) + '&rss_url=' + encodeURIComponent(feedUrl);
      var res = await fetch(url);
      if (!res.ok) throw new Error('rss2json HTTP ' + res.status);
      return await res.json();
    }

    function renderNewsItemsFromXml(xmlDoc, elementId, maxItems) {
      var list = document.getElementById(elementId);
      list.innerHTML = '';
      var items = xmlDoc.getElementsByTagName('item');
      var n = Math.min(items.length, maxItems || 30);

      if (!n) {
        var emptyLi = document.createElement('li');
        emptyLi.className = 'card';
        emptyLi.textContent = 'No items available right now.';
        list.appendChild(emptyLi);
        return;
      }

      for (var i = 0; i < n; i++) {
        var it = items[i];
        var rawTitle = textOf(it, 'title') || 'Untitled';
        var link = textOf(it, 'link') || '#';
        var pubDate = textOf(it, 'pubDate');
        var dateText = pubDate ? formatDate(pubDate) : null;

        // Google News sometimes includes <source>Outlet</source>
        var sourceNodes = it.getElementsByTagName('source');
        var source = (sourceNodes && sourceNodes.length) ? (sourceNodes[0].textContent || '').trim() : '';

        var split = splitTitle(rawTitle);
        var displayTitle = split.headline || 'Untitled';

        // Publication line priority: explicit <source> first, else part after hyphen/em dash
        var publication = source || split.publication || '';

        // Author: some items include <dc:creator>, <author>, etc.
        var author = '';
        var creators = it.getElementsByTagName('dc:creator');
        if (creators && creators.length) author = (creators[0].textContent || '').trim();
        if (!author) author = textOf(it, 'author'); // fallback if present

        var li = document.createElement('li');
        li.className = 'card';

        var html = '';
        html += '<a class="title" href="' + link + '" target="_blank" rel="noopener noreferrer">' + displayTitle + '</a>';
        html += '<div class="meta">';
        if (publication) html += '<div class="source">' + publication + '</div>';
        if (author) html += '<div class="author">' + author + '</div>';
        if (dateText) html += '<div class="date">' + dateText + '</div>';
        html += '</div>';

        li.innerHTML = html;
        list.appendChild(li);
      }
    }

    function renderNewsItemsFromRss2Json(json, elementId) {
      var list = document.getElementById(elementId);
      list.innerHTML = '';
      var items = (json && json.items) ? json.items : [];
      if (!items.length) {
        var emptyLi = document.createElement('li');
        emptyLi.className = 'card';
        emptyLi.textContent = 'No items available right now.';
        list.appendChild(emptyLi);
        return;
      }

      var n = Math.min(items.length, 30);

      for (var i = 0; i < n; i++) {
        var item = items[i];
        var rawTitle = item && item.title ? item.title : 'Untitled';
        var link = item && item.link ? item.link : '#';
        var dateText = (item && item.pubDate) ? formatDate(item.pubDate) : null;

        var split = splitTitle(rawTitle);
        var displayTitle = split.headline || 'Untitled';
        var publication = (item && item.author) ? item.author : (split.publication || '');
        var author = (item && item.author) ? item.author : '';

        var li = document.createElement('li');
        li.className = 'card';

        var html = '';
        html += '<a class="title" href="' + link + '" target="_blank" rel="noopener noreferrer">' + displayTitle + '</a>';
        if (publication || author || dateText) {
          html += '<div class="meta">';
          if (publication) html += '<div class="source">' + publication + '</div>';
          if (author) html += '<div class="author">' + author + '</div>';
          if (dateText) html += '<div class="date">' + dateText + '</div>';
          html += '</div>';
        }

        li.innerHTML = html;
        list.appendChild(li);
      }
    }

    // ---------------- Controller ----------------
    async function loadNews() {
      var list = document.getElementById('feed2');
      showStatus('Loading news…', false);
      list.innerHTML = '<li class="card" aria-busy="true" style="opacity:.8">Loading…</li>';

      // Updated Google News RSS query with your comprehensive terms
      var feedUrl =
        'https://news.google.com/rss/search?q=' +
        encodeURIComponent('military sUAS use OR sUAS combat OR Armed sUAS OR Military FPV Drone OR FPV Drone attack OR FPV Drone strike OR Commercial drone attack OR commercial drone warfare OR sUAS warfare OR sUAS defence OR c-sUAS');

      try {
        // Preferred path: raw RSS via AllOrigins (less likely to rate limit)
        var xml = await fetchRSSXmlViaAllOrigins(feedUrl);
        renderNewsItemsFromXml(xml, 'feed2', 30);
        showStatus('', false); // hide status
      } catch (e1) {
        console.warn('AllOrigins path failed, trying rss2json fallback:', e1);
        try {
          // Fallback path: rss2json with count=30
          var json = await fetchRSSViaRss2Json(feedUrl, 30);
          renderNewsItemsFromRss2Json(json, 'feed2');
          showStatus('', false);
        } catch (e2) {
          console.error('rss2json fallback failed:', e2);
          list.innerHTML = '';
          var li = document.createElement('li');
          li.className = 'card';
          li.textContent = 'Could not load feed. Try again later.';
          list.appendChild(li);
          showStatus('Could not load news (network issue or rate limiting). Will retry automatically.', true);
        }
      }
    }

    function refreshFeeds() {
      loadNews();
      // When you add these, call loadRSS for them similarly:
      // loadSocial();
      // loadAcademia();
    }

    refreshFeeds(); // initial load
    setInterval(refreshFeeds, 300000); // every 5 minutes
  </script>

</body>
</html>
