<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>sUAS database</title>
  <style>
    body {
      font-family: Courier, serif;
      margin: 2rem;
      background: #2b2b2b; /* dark grey background */
      color: #f0f0f0; /* light text for contrast */
    }
    h1 {
      font-size: 1.6rem; /* slightly smaller heading */
      margin-bottom: 1.5rem;
    }
    a {
      text-decoration: none;
      color: #4da3ff;
    }
    a:hover {
      text-decoration: underline;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <h1>sUAS database</h1>
  <ul id="feed"></ul>

  <script>
    async function loadRSS() {
      const proxy = "https://api.rss2json.com/v1/api.json?rss_url=";
      const feedUrl = encodeURIComponent("https://your-rss-link.com/feed"); // replace with your RSS URL
      const res = await fetch(proxy + feedUrl);
      const data = await res.json();
      const list = document.getElementById('feed');
      data.items.forEach(item => {
        const li = document.createElement('li');
        li.innerHTML = `<a href="${item.link}" target="_blank">${item.title}</a>`;
        list.appendChild(li);
      });
    }
    loadRSS();
  </script>
</body>
</html>
