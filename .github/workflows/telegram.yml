name: Telegram Feed

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch, filter, translate and summarise Telegram posts
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python3 << 'EOF'
          import urllib.request, urllib.error, json, datetime, time, re, os

          api_key = os.environ.get("OPENROUTER_API_KEY", "")
          print(f"API key present: {bool(api_key)} (length {len(api_key)})")

          CHANNELS = [
            'DefenderDome',
            'OSINTdefender',
            'wartranslated',
            'lost_armour',
            'VictoryDrones2023',
            'VictoryDrones',
            'noel_reports',
            'combat_ftg2',
            'serhii_flash',
          ]

          CORE = [
            # English
            'fpv', 'fpv drone', 'fpv attack', 'fpv strike', 'fpv drones',
            'small uas', 'suas', 'small drone', 'quadcopter', 'hexacopter',
            'dji', 'mavic', 'phantom', 'matrice', 'first-person view',
            # Ukrainian / Russian
            'fpv дрон', 'fpv дрони', 'fpv удар', 'fpv атака',
            'квадрокоптер', 'квадрокоптери', 'квадрокоптером',
            'мавік', 'мавик', 'бпла',
          ]
          CONTEXT = [
            # English
            'military', 'combat', 'warfare', 'battlefield', 'ukraine', 'russia',
            'frontline', 'trench', 'strike', 'attack', 'munition', 'warhead',
            'loitering', 'kamikaze', 'ew', 'jamming', 'counter-uas',
            'c-uas', 'anti-drone', 'counter drone', 'c-ram',
            # Ukrainian
            'україна', 'фронт', 'окопи', 'удар', 'атака', 'бойов',
            'війна', 'збройн', 'ворог', 'противник', 'позиц',
            # Russian
            'украина', 'фронт', 'окопы', 'атака', 'боев',
            'война', 'вооруж', 'враг', 'противник', 'позици',
          ]
          BLOCK = [
            'shahed', 'geran', 'tb2', 'bayraktar', 'akinci', 'mq-9', 'reaper',
            'global hawk', 'long-range drone', 'strategic drone', 'drone light show',
            'drone show', 'amazon drone', 'drone photography', 'best drone',
            'drone review', 'firefighting drone', 'agriculture drone',
            'medical drone', 'package delivery', 'delivery drone',
            'шахед', 'герань', 'байрактар',
          ]

          def is_allowed(text):
            t = (text or '').lower()
            if any(b in t for b in BLOCK):
              return False
            has_core = any(k in t for k in CORE)
            has_ctx  = any(k in t for k in CONTEXT)
            return has_core and has_ctx

          def strip_tags(html):
            text = re.sub(r'<br\s*/?>', ' ', html, flags=re.IGNORECASE)
            text = re.sub(r'<[^>]+>', '', text)
            text = text.replace('&amp;', '&').replace('&lt;', '<').replace('&gt;', '>').replace('&quot;', '"').replace('&#39;', "'").replace('&nbsp;', ' ')
            return re.sub(r'\s+', ' ', text).strip()

          def is_english(text):
            """Rough check — if >25% of letters are Cyrillic, treat as non-English."""
            letters = [c for c in text if c.isalpha()]
            if not letters:
              return True
            cyrillic = sum(1 for c in letters if '\u0400' <= c <= '\u04ff')
            return (cyrillic / len(letters)) < 0.25

          def fetch_channel(channel):
            url = f"https://t.me/s/{channel}"
            try:
              req = urllib.request.Request(
                url,
                headers={
                  "User-Agent": "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
                  "Accept": "text/html,application/xhtml+xml",
                  "Accept-Language": "en-US,en;q=0.9",
                }
              )
              with urllib.request.urlopen(req, timeout=15) as r:
                html = r.read().decode('utf-8', errors='replace')

              texts = re.findall(
                r'<div class="tgme_widget_message_text[^"]*"[^>]*>(.*?)</div>',
                html, re.DOTALL
              )
              links = re.findall(
                r'<a class="tgme_widget_message_date"[^>]*href="(https://t\.me/[^"]+)"',
                html
              )
              dates = re.findall(
                r'<time[^>]*datetime="([^"]+)"',
                html
              )

              posts = []
              for i in range(len(texts)):
                text = strip_tags(texts[i])
                if not text:
                  continue
                if not is_allowed(text):
                  continue
                link = links[i] if i < len(links) else f"https://t.me/s/{channel}"
                date = dates[i] if i < len(dates) else ''
                posts.append({
                  'channel': channel,
                  'snippet': text[:400],
                  'snippet_en': None,   # filled in by translation step
                  'needs_translation': not is_english(text),
                  'link': link,
                  'pubDate': date,
                })

              print(f"  {channel}: {len(posts)} matching posts ({sum(1 for p in posts if p['needs_translation'])} need translation)")
              return posts

            except Exception as e:
              print(f"  {channel}: failed — {e}")
              return []

          # ── Fetch all channels ───────────────────────────────────────────────
          all_posts = []
          for ch in CHANNELS:
            all_posts.extend(fetch_channel(ch))
            time.sleep(0.8)

          def parse_date(d):
            try:
              from datetime import datetime, timezone
              return datetime.fromisoformat(d.replace('Z', '+00:00')).timestamp()
            except:
              return 0

          all_posts.sort(key=lambda p: parse_date(p['pubDate']), reverse=True)

          # ── Translation (one API call per non-English post) ────────────────
          to_translate = [(i, p) for i, p in enumerate(all_posts) if p['needs_translation']]
          print(f"\n{len(to_translate)} posts need translation.")

          def translate_post(text):
            """Translate a single post to English. Returns translated string or None on failure."""
            prompt = (
              "Translate the following Telegram post into clear, natural English. "
              "Return ONLY the translated text — no explanation, no quotes, no preamble.\n\n" + text
            )
            req = urllib.request.Request(
              "https://openrouter.ai/api/v1/chat/completions",
              data=json.dumps({
                "model": "arcee-ai/trinity-large-preview:free",
                "messages": [{"role": "user", "content": prompt}],
                "max_tokens": 400,
                "temperature": 0.2
              }).encode(),
              headers={
                "Content-Type": "application/json",
                "Authorization": f"Bearer {api_key}",
                "HTTP-Referer": "https://github.com",
                "X-Title": "sUAS Telegram Translator"
              }
            )
            try:
              with urllib.request.urlopen(req, timeout=20) as r:
                data = json.loads(r.read())
              return data["choices"][0]["message"]["content"].strip()
            except Exception as e:
              print(f"    Translation error: {e}")
              return None

          if api_key:
            for idx, (i, p) in enumerate(to_translate):
              print(f"  Translating post {idx+1}/{len(to_translate)} from @{p['channel']}...")
              result = translate_post(p['snippet'])
              if result:
                all_posts[i]['snippet_en'] = result
              time.sleep(0.5)  # avoid rate limiting

          # For English posts (or failed translations), snippet_en = snippet
          for p in all_posts:
            if p['snippet_en'] is None:
              p['snippet_en'] = p['snippet']
            del p['needs_translation']   # clean up before saving

          # ── Write telegram.json ──────────────────────────────────────────────
          updated = datetime.datetime.now(datetime.timezone.utc).strftime("%-d %b %Y, %H:%M UTC")
          out = {"posts": all_posts, "updated": updated, "count": len(all_posts)}
          with open("telegram.json", "w") as f:
            json.dump(out, f)
          print(f"telegram.json written — {len(all_posts)} total posts.")

          # ── AI Summary ───────────────────────────────────────────────────────
          if not all_posts or not api_key:
            with open("telegram-summary.json", "w") as f:
              json.dump({
                "summary": "No matching sUAS/FPV posts found in this hour's feed." if not all_posts else "Summary unavailable — API key not set.",
                "updated": updated
              }, f)
            exit(0)

          sample = all_posts[:20]
          post_text = "\n".join(f"- [{p['channel']}] {p['snippet_en']}" for p in sample)

          summary_prompt = (
            "You are a defence analyst tracking small UAS (small commercial quadcopters and FPV drones only). "
            "The following posts are from Telegram channels monitoring the battlefield, already translated into English. "
            "Write a 3-5 sentence summary of what these posts collectively report. "
            "Focus only on specific incidents, tactics, weapons, or developments — no broad overviews. "
            "If a post mentions a specific event, location, or detail, include it. "
            "Be factual, specific, and concise. Do not start with a time reference.\n\n"
            "Posts:\n" + post_text
          )

          print("Calling OpenRouter API for Telegram summary...")
          req = urllib.request.Request(
            "https://openrouter.ai/api/v1/chat/completions",
            data=json.dumps({
              "model": "arcee-ai/trinity-large-preview:free",
              "messages": [{"role": "user", "content": summary_prompt}],
              "max_tokens": 300,
              "temperature": 0.4
            }).encode(),
            headers={
              "Content-Type": "application/json",
              "Authorization": f"Bearer {api_key}",
              "HTTP-Referer": "https://github.com",
              "X-Title": "sUAS Telegram Summariser"
            }
          )
          try:
            with urllib.request.urlopen(req) as r:
              data = json.loads(r.read())
            summary = data["choices"][0]["message"]["content"].strip()
            print(f"Summary: {summary[:120]}...")
          except Exception as e:
            print(f"Summary API error: {e}")
            summary = "Summary unavailable — API error."

          with open("telegram-summary.json", "w") as f:
            json.dump({"summary": summary, "updated": updated}, f)
          print("telegram-summary.json written.")
          EOF

      - name: Commit outputs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add telegram.json telegram-summary.json
          git diff --cached --quiet || git commit -m "chore: update telegram feed"
          git pull --rebase origin main
          git push
