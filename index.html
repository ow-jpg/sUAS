<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>sUAS database</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #1e1e1e;
      color: #f0f0f0;
      font-family: Courier, serif;
    }

    body { padding: 2rem; }

    h1 { font-size: 1.6rem; margin-bottom: 2rem; }

    h2 {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid #444;
      padding-bottom: 0.5rem;
      text-transform: lowercase;
    }

    .columns { display: flex; justify-content: space-between; gap: 2rem; }
    .column { flex: 1; min-width: 0; }

    /* Let lists grow with the page (no fixed 500px cap) */
    ul { list-style: none; padding: 0; }

    li { margin-bottom: 1rem; }

    a { text-decoration: none; color: #4da3ff; }
    a:hover { text-decoration: underline; }

    /* --- News card styles --- */
    .news-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.8rem;
      padding-right: 0.25rem;
      /* Ensure the news list itself doesn't clip; page scrolls instead */
      max-height: none;
      overflow: visible;
    }

    .card {
      background: #4B365F;              /* your color */
      border: 1px solid #3d2c4e;        /* slightly darker border for definition */
      border-radius: 10px;
      padding: 0.9rem 1rem;
      transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.2s ease;
      text-align: center;               /* center all content in the card */
    }

    .card:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.35);
      border-color: #5a4370;            /* subtle highlight on hover */
    }

    .card a.title {
      display: inline-block;
      color: #ffffff;                    /* strong contrast on purple */
      font-weight: 700;
      text-decoration: none;
      line-height: 1.35;
    }

    .card a.title:hover { text-decoration: underline; }

    .meta {
      margin-top: 0.55rem;
      display: flex;
      flex-direction: column;            /* stack lines: publication, author, date */
      align-items: center;
      gap: 0.35rem;
    }

    .meta .source { color: #f1e9fa; font-size: 0.9rem; font-weight: 600; }
    .meta .author { color: #e9dbf6; font-size: 0.88rem; }
    .meta .date   { color: #d9c8ee; font-size: 0.86rem; }

    .status {
      color: #cfcfcf;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin: 0.25rem 0 1rem 0;
      font-size: 0.95rem;
    }
    .status.error { border-color: #513333; background: #2a1e1e; color: #ffbcbc; }

    @media (max-width: 900px) { .columns { flex-direction: column; } }
  </style>
</head>
<body>

  <noscript style="color:#ffbcbc;">This page requires JavaScript to load feeds.</noscript>

  <h1>sUAS database</h1>

  <div class="columns">
    <div class="column">
      <h2>social</h2>
      <ul id="feed1"></ul>
    </div>

    <div class="column">
      <h2>news</h2>
      <div id="news-status" class="status" style="display:none;"></div>
      <ul id="feed2" class="news-list"></ul>
    </div>

    <div class="column">
      <h2>academia</h2>
      <ul id="feed3"></ul>
    </div>
  </div>

  <script>
    /* ---------------- CONFIG: Query & Feed URL ----------------
       This query targets small/FPV/commercial drones in warfare and excludes big platforms.
       It also adds a recency window (last 30 days) to increase throughput.
    */
    var QUERY = [
      '(' +
        'intitle:FPV OR "FPV drone" OR "FPV attack" OR "FPV strike" OR ' +
        'sUAS OR "small UAS" OR "small drone" OR "commercial drone" OR "commercial quadcopter" OR ' +
        'quadcopter OR "DJI Mavic" OR "DJI FPV" OR "COTS drone" OR "off-the-shelf drone" OR "improvised drone" OR "racing drone"' +
      ')' +
      ' AND ' +
      '(' +
        'warfare OR combat OR attack OR strike OR battlefield OR military OR infantry OR "front-line"' +
      ')' +
      ' when:30d ' + // last 30 days for volume
      // Exclude big drones / strategic systems
      ' -shahed -"shahed-136" -"shahed 131" -TB2 -Bayraktar -MQ-9 -Reaper -"Wing Loong" -HALE -MALE -"long-range" -"cruise missile"'
    ].join('');

    // Build the base Google News RSS URL (we’ll add edition params in proxies)
    var FEED_URL = 'https://news.google.com/rss/search?q=' + encodeURIComponent(QUERY);

    /* ---------------- Helpers ---------------- */
    function formatDate(dateStr) {
      try {
        var d = new Date(dateStr);
        if (isNaN(d.getTime())) return null;
        return d.toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' });
      } catch (e) { return null; }
    }

    function showStatus(message, isError) {
      var el = document.getElementById('news-status');
      if (!el) return;
      el.textContent = message || '';
      el.className = isError ? 'status error' : 'status';
      el.style.display = message ? 'block' : 'none';
    }

    // Trim title before first hyphen / em dash → publication after separator
    function splitTitle(title) {
      if (!title) return { headline: '', publication: '' };
      var hyphenIdx = title.indexOf(' - ');
      if (hyphenIdx !== -1) {
        return {
          headline: title.slice(0, hyphenIdx).trim(),
          publication: title.slice(hyphenIdx + 3).trim()
        };
      }
      var emDashIdx = title.indexOf(' — ');
      if (emDashIdx !== -1) {
        return {
          headline: title.slice(0, emDashIdx).trim(),
          publication: title.slice(emDashIdx + 3).trim()
        };
      }
      return { headline: title.trim(), publication: '' };
    }

    function textOf(node, tag) {
      var els = node.getElementsByTagName(tag);
      if (els && els.length) return (els[0].textContent || '').trim();
      return '';
    }

    /* ---------------- LocalStorage cache (versioned & URL‑tied) ---------------- */
    var CACHE_VERSION = 'v5_20260303';
    var CACHE_BASE = 'news_cache_' + CACHE_VERSION + '_';
    var CACHE_KEY = CACHE_BASE + btoa(FEED_URL).slice(0, 16);
    var CACHE_TIME_KEY = CACHE_KEY + '_time';
    var CACHE_TTL_MS = 2 * 60 * 60 * 1000; // consider 'fresh' for 2 hours

    function saveCache(items) {
      try {
        localStorage.setItem(CACHE_KEY, JSON.stringify(items || []));
        localStorage.setItem(CACHE_TIME_KEY, String(Date.now()));
      } catch (e) { /* ignore quota errors */ }
    }

    function loadCache() {
      try {
        var raw = localStorage.getItem(CACHE_KEY);
        var when = parseInt(localStorage.getItem(CACHE_TIME_KEY) || '0', 10);
        var items = raw ? JSON.parse(raw) : [];
        var fresh = when && (Date.now() - when < CACHE_TTL_MS);
        return { items: items, when: when, fresh: fresh };
      } catch (e) {
        return { items: [], when: 0, fresh: false };
      }
    }

    /* ---------------- Normalized rendering ----------------
       items: [{title, link, publication, author, pubDateISO}]
    */
    function renderNormalizedItems(items, elementId, maxItems) {
      var list = document.getElementById(elementId);
      list.innerHTML = '';
      var n = Math.min(items.length, maxItems || 20);
      if (!n) {
        var emptyLi = document.createElement('li');
        emptyLi.className = 'card';
        emptyLi.textContent = 'No items available right now.';
        list.appendChild(emptyLi);
        return;
      }
      for (var i = 0; i < n; i++) {
        var it = items[i];
        var displayTitle = it.title || 'Untitled';
        var link = it.link || '#';
        var publication = it.publication || '';
        var author = it.author || '';
        var dateText = it.pubDateISO ? formatDate(it.pubDateISO) : null;

        var li = document.createElement('li');
        li.className = 'card';

        var html = '';
        html += '<a class="title" href="' + link + '" target="_blank" rel="noopener noreferrer">' + displayTitle + '</a>';
        html += '<div class="meta">';
        if (publication) html += '<div class="source">' + publication + '</div>';
        if (author) html += '<div class="author">' + author + '</div>';
        if (dateText) html += '<div class="date">' + dateText + '</div>';
        html += '</div>';

        li.innerHTML = html;
        list.appendChild(li);
      }
    }

    /* ---------------- Fetch via multiple proxies (XML path) ---------------- */
    function buildProxyUrls(feedUrl) {
      // Use a high‑volume edition by default to increase article count.
      // Add cache‑buster so proxies fetch fresh content.
      var cacheBust = '&_=' + Date.now();
      var augmented = feedUrl + '&hl=en&gl=US&ceid=US:en' + cacheBust; // broaden to US edition for throughput
      return [
        'https://cors.isomorphic-git.org/' + augmented,                                 // Proxy 1
        'https://corsproxy.io/?' + augmented,                                           // Proxy 2
        'https://api.allorigins.win/raw?url=' + encodeURIComponent(augmented)           // Proxy 3
      ];
    }

    async function tryFetchXMLWithProxies(feedUrl) {
      var urls = buildProxyUrls(feedUrl);
      for (var i = 0; i < urls.length; i++) {
        try {
          var res = await fetch(urls[i]);
          if (!res.ok) continue;
          var text = await res.text();
          var parser = new DOMParser();
          var xml = parser.parseFromString(text, 'text/xml');
          var err = xml.getElementsByTagName('parsererror');
          if (err && err.length) continue;
          return xml;
        } catch (e) { /* try next proxy */ }
      }
      throw new Error('All XML proxies failed');
    }

    /* ---------------- Fallback: rss2json ---------------- */
    async function fetchRSSViaRss2Json(feedUrl, count) {
      var url = 'https://api.rss2json.com/v1/api.json?count=' + (count || 20) +
                '&rss_url=' + encodeURIComponent(feedUrl + '&hl=en&gl=US&ceid=US:en&_=' + Date.now());
      var res = await fetch(url);
      if (!res.ok) throw new Error('rss2json HTTP ' + res.status);
      return await res.json();
    }

    /* ---------------- Normalize items from XML / JSON ---------------- */
    function itemsFromXml(xmlDoc, limit) {
      var out = [];
      var items = xmlDoc.getElementsByTagName('item');
      var n = Math.min(items.length, limit || 20);
      for (var i = 0; i < n; i++) {
        var it = items[i];
        var rawTitle = textOf(it, 'title') || 'Untitled';
        var link = textOf(it, 'link') || '#';
        var pubDate = textOf(it, 'pubDate') || '';

        // Prefer explicit <source> (Google News adds this for the outlet)
        var sourceNodes = it.getElementsByTagName('source');
        var source = (sourceNodes && sourceNodes.length) ? (sourceNodes[0].textContent || '').trim() : '';

        var split = splitTitle(rawTitle);
        var headline = split.headline || 'Untitled';
        var publication = source || split.publication || '';

        // Author variations (<dc:creator> or <author>)
        var author = '';
        var creators = it.getElementsByTagName('dc:creator');
        if (creators && creators.length) author = (creators[0].textContent || '').trim();
        if (!author) author = textOf(it, 'author');

        out.push({
          title: headline,
          link: link,
          publication: publication,
          author: author,
          pubDateISO: pubDate
        });
      }
      return out;
    }

    function itemsFromRss2Json(json, limit) {
      var out = [];
      var arr = (json && json.items) ? json.items : [];
      var n = Math.min(arr.length, limit || 20);
      for (var i = 0; i < n; i++) {
        var it = arr[i];
        var rawTitle = it && it.title ? it.title : 'Untitled';
        var link = it && it.link ? it.link : '#';
        var pubDateISO = (it && it.pubDate) ? it.pubDate : '';

        var split = splitTitle(rawTitle);
        var headline = split.headline || 'Untitled';
        // rss2json often maps outlet → author; use it for publication if available
        var publication = (it && it.author) ? it.author : (split.publication || '');
        var author = (it && it.author) ? it.author : '';

        out.push({
          title: headline,
          link: link,
          publication: publication,
          author: author,
          pubDateISO: pubDateISO
        });
      }
      return out;
    }

    /* ---------------- Controller ---------------- */
    async function loadNews() {
      var list = document.getElementById('feed2');
      showStatus('Loading news…', false);
      list.innerHTML = '<li class="card" aria-busy="true" style="opacity:.8">Loading…</li>';

      try {
        // Preferred path: multiple CORS proxies fetching RAW RSS XML
        var xml = await tryFetchXMLWithProxies(FEED_URL);
        var items = itemsFromXml(xml, 20);
        saveCache(items);
        renderNormalizedItems(items, 'feed2', 20);
        showStatus('', false); // hide
      } catch (e1) {
        console.warn('XML proxy path failed, trying rss2json fallback:', e1);
        try {
          var json = await fetchRSSViaRss2Json(FEED_URL, 20);
          var itemsJ = itemsFromRss2Json(json, 20);
          saveCache(itemsJ);
          renderNormalizedItems(itemsJ, 'feed2', 20);
          showStatus('', false);
        } catch (e2) {
          console.error('rss2json fallback failed:', e2);
          // Fall back to cache if we have it
          var cache = loadCache();
          if (cache.items && cache.items.length) {
            renderNormalizedItems(cache.items, 'feed2', 20);
            var whenStr = cache.when ? new Date(cache.when).toLocaleString() : 'earlier';
            showStatus('Showing cached news from ' + whenStr + ' (live update failed).', true);
          } else {
            list.innerHTML = '';
            var li = document.createElement('li');
            li.className = 'card';
            li.textContent = 'Could not load feed. Try again later.';
            list.appendChild(li);
            showStatus('Could not load news (network issue or rate limiting). Will retry automatically.', true);
          }
        }
      }
    }

    function refreshFeeds() {
      loadNews();
      // loadSocial(); loadAcademia(); // when ready
    }

    // Initial load + periodic refresh
    refreshFeeds();
    setInterval(refreshFeeds, 300000); // every 5 minutes
  </script>

</body>
</html>
