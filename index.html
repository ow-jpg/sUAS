<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>sUAS database</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #1e1e1e;
      color: #f0f0f0;
      font-family: Courier, serif;
    }

    body {
      padding: 2rem;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 2rem;
    }

    h2 {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      border-bottom: 1px solid #444;
      padding-bottom: 0.5rem;
      text-transform: lowercase;
    }

    .columns {
      display: flex;
      justify-content: space-between;
      gap: 2rem;
    }

    .column {
      flex: 1;
      min-width: 0; /* prevents overflow with grid children */
    }

    ul {
      list-style: none;
      padding: 0;
      max-height: 500px;
      overflow-y: auto; /* makes it scroll like a rolling list */
    }

    li {
      margin-bottom: 1rem;
    }

    a {
      text-decoration: none;
      color: #4da3ff;
    }

    a:hover {
      text-decoration: underline;
    }

    /* --- Card styles for news feed --- */
    .news-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.8rem; /* space between cards */
      padding-right: 0.25rem; /* tiny room for scrollbar */
    }

    .card {
      background: #242424;
      border: 1px solid #2f2f2f;
      border-radius: 10px;
      padding: 0.9rem 1rem;
      transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.2s ease;
    }

    .card:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.25);
      border-color: #3a3a3a;
    }

    .card a.title {
      display: inline-block;
      color: #e6f0ff;            /* softer than pure blue on dark */
      font-weight: 600;
      text-decoration: none;
      line-height: 1.35;
    }

    .card a.title:hover {
      text-decoration: underline;
    }

    .card .meta {
      margin-top: 0.45rem;
      color: #bdbdbd;
      font-size: 0.86rem;
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .card .dot {
      opacity: 0.55;
    }

    .card .excerpt {
      margin-top: 0.5rem;
      color: #d7d7d7;
      font-size: 0.92rem;
      line-height: 1.4;
    }

    .status {
      color: #cfcfcf;
