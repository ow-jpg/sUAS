name: Telegram Feed

on:
  schedule:
    - cron: '30 */3 * * *'   # every 3 hours
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch and filter Telegram posts
        run: |
          python3 << 'EOF'
          import urllib.request, urllib.error, xml.etree.ElementTree as ET, json, datetime, time

          CHANNELS = [
            'DefenderDome',
            'OSINTdefender',
            'wartranslated',
            'lost_armour',
            'VictoryDrones2023',
            'VictoryDrones',
            'noel_reports',
            'combat_ftg2',
            'serhii_flash',
          ]

          # A post must match at least one CORE keyword AND one CONTEXT keyword
          CORE = [
            'fpv', 'fpv drone', 'fpv attack', 'fpv strike', 'fpv drones',
            'small uas', 'suas', 'small drone', 'quadcopter', 'hexacopter',
            'dji', 'mavic', 'phantom', 'matrice', 'first-person view',
          ]
          CONTEXT = [
            'military', 'combat', 'warfare', 'battlefield', 'ukraine', 'russia',
            'frontline', 'trench', 'strike', 'attack', 'munition', 'warhead',
            'loitering', 'kamikaze', 'ew', 'jamming', 'counter-uas',
            'c-uas', 'anti-drone', 'counter drone', 'c-ram',
          ]
          BLOCK = [
            'shahed', 'geran', 'tb2', 'bayraktar', 'akinci', 'mq-9', 'reaper',
            'global hawk', 'long-range drone', 'strategic drone', 'drone light show',
            'drone show', 'amazon drone', 'drone photography', 'best drone',
            'drone review', 'firefighting drone', 'agriculture drone',
            'medical drone', 'package delivery', 'delivery drone',
          ]

          RSSHUB_INSTANCES = [
            'https://rsshub.app',
            'https://rss.fatpandadev.com',
            'https://rsshub.rssforever.com',
          ]

          def is_allowed(text):
            t = (text or '').lower()
            if any(b in t for b in BLOCK):
              return False
            has_core = any(k in t for k in CORE)
            has_ctx  = any(k in t for k in CONTEXT)
            return has_core and has_ctx

          def fetch_channel(channel):
            for base in RSSHUB_INSTANCES:
              url = f"{base}/telegram/channel/{channel}"
              try:
                req = urllib.request.Request(
                  url,
                  headers={"User-Agent": "Mozilla/5.0", "Accept": "application/rss+xml, application/xml, text/xml"}
                )
                with urllib.request.urlopen(req, timeout=12) as r:
                  raw = r.read()
                tree = ET.fromstring(raw)
                posts = []
                for item in tree.iter('item'):
                  title = (item.findtext('title') or '').strip()
                  link  = (item.findtext('link')  or '').strip()
                  desc  = (item.findtext('description') or '').strip()
                  pub   = (item.findtext('pubDate') or '').strip()
                  text  = title + ' ' + desc
                  if not is_allowed(text):
                    continue
                  # Clean HTML tags from description for a plain text snippet
                  import re
                  snippet = re.sub(r'<[^>]+>', ' ', desc)
                  snippet = re.sub(r'\s+', ' ', snippet).strip()[:300]
                  posts.append({
                    'channel': channel,
                    'title': title,
                    'link': link,
                    'snippet': snippet,
                    'pubDate': pub,
                  })
                print(f"  {channel}: {len(posts)} matching posts (via {base})")
                return posts
              except Exception as e:
                print(f"  {channel} failed on {base}: {e}")
                time.sleep(1)
            print(f"  {channel}: all instances failed")
            return []

          all_posts = []
          for ch in CHANNELS:
            posts = fetch_channel(ch)
            all_posts.extend(posts)

          # Sort newest first
          def parse_date(d):
            try:
              from email.utils import parsedate_to_datetime
              return parsedate_to_datetime(d).timestamp()
            except:
              return 0

          all_posts.sort(key=lambda p: parse_date(p['pubDate']), reverse=True)

          updated = datetime.datetime.now(datetime.timezone.utc).strftime("%-d %b %Y, %H:%M UTC")
          out = {"posts": all_posts, "updated": updated, "count": len(all_posts)}

          with open("telegram.json", "w") as f:
            json.dump(out, f)

          print(f"\ntelegram.json written — {len(all_posts)} total posts across {len(CHANNELS)} channels.")
          EOF

      - name: Commit telegram.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add telegram.json
          git diff --cached --quiet || git commit -m "chore: update telegram feed"
          git push
